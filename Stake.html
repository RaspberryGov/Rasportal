<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freeberry Portal - Staking Station</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f0c;       /* Deep matte forest charcoal */
            --box-bg: #111612;         /* Solid card background */
            --accent-gold: #d4af37;    /* Classic alignment text & borders */
            --accent-green: #245832;   /* Muted organic green primary buttons */
            --accent-green-hover: #2e6f40;
            --accent-red: #722323;     /* Muted organic red for destaking actions */
            --accent-red-hover: #8f3030;
            --text-main: #f0f4f1;
            --text-muted: #8d9c91;
            --border: #1d2720;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Header Navigation Element */
        .portal-header {
            width: 100%;
            max-width: 760px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .portal-title {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent-gold);
            text-transform: uppercase;
        }

        .btn-wallet {
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn-wallet:hover {
            background: var(--accent-gold);
            color: var(--bg-color);
        }

        /* Compact Dashboard Container */
        .layout-container {
            width: 100%;
            max-width: 760px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .app-box {
            background: var(--box-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .box-title {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 1px;
            color: var(--text-main);
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        /* Metric Rows (Left Box) */
        .metric-row {
            margin-bottom: 18px;
        }

        .metric-row:last-child {
            margin-bottom: 0;
        }

        .metric-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent-gold);
            word-break: break-all;
        }

        /* Input Controls (Right Box) */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            border-radius: 2px;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.2s ease;
        }

        .btn-stake {
            background: var(--accent-green);
        }

        .btn-stake:hover {
            background: var(--accent-green-hover);
        }

        .btn-unstake {
            background: var(--accent-red);
        }

        .btn-unstake:hover {
            background: var(--accent-red-hover);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        /* Mobile Adjustments */
        @media(max-width: 640px) {
            .layout-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="portal-header">
        <div class="portal-title">Rasportal Staking</div>
        <button class="btn-wallet" id="wallet-btn" onclick="connectWallet()">Connect Wallet</button>
    </header>

    <div class="layout-container">
        
        <section class="app-box">
            <div>
                <h2 class="box-title">Dashboard</h2>
                
                <div class="metric-row">
                    <div class="metric-label">Token Balance</div>
                    <div class="metric-value" id="val-balance">0.00</div>
                </div>

                <div class="metric-row">
                    <div class="metric-label">Staked Tokens</div>
                    <div class="metric-value" id="val-staked">0.00</div>
                </div>

                <div class="metric-row">
                    <div class="metric-label">Earned Tokens</div>
                    <div class="metric-value" id="val-earned">0.00</div>
                </div>
            </div>
        </section>

        <section class="app-box">
            <div>
                <h2 class="box-title">Staking Actions</h2>
                
                <div class="input-group">
                    <label>Amount to Stake</label>
                    <input type="number" id="stake-amount" placeholder="0.0" min="0" step="any">
                </div>
                <button class="btn-action btn-stake" onclick="executeStake()">Start Stake</button>

                <div class="divider"></div>

                <button class="btn-action btn-unstake" onclick="executeEndStake()">End Stake</button>
            </div>
        </section>

    </div>

    <script>
        const CONTRACT_ADDRESS = "TVNkzWFsP2y3hAPUJkJWWDZA2srMSbP2ep";
        let userAddress = null;
        let contract = null;
        let decimals = 6;

        window.addEventListener('load', () => {
            setTimeout(() => {
                if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
                    initPortal();
                }
            }, 400);
        });

        async function initPortal() {
            try {
                userAddress = window.tronWeb.defaultAddress.base58;
                document.getElementById('wallet-btn').innerText = userAddress.substring(0,6) + "..." + userAddress.substring(userAddress.length - 4);
                
                contract = await window.tronWeb.contract().at(CONTRACT_ADDRESS);
                await updateData();
                
                // Keep values updated in the background
                setInterval(updateData, 8000);
            } catch(e) {
                console.error("Portal initialization failed:", e);
            }
        }

        async function connectWallet() {
            if (window.tronLink) {
                const res = await window.tronLink.request({ method: 'tron_requestAccounts' });
                if (res.code === 200) initPortal();
            } else {
                alert("TronLink extension not found.");
            }
        }

        async function updateData() {
            if (!contract || !userAddress) return;

            try {
                // Fetch dynamic data tracking points
                const rawDecimals = await contract.decimals().call().catch(() => 6);
                decimals = parseInt(rawDecimals._hex || rawDecimals);
                const divisor = Math.pow(10, decimals);

                const balance = await contract.balanceOf(userAddress).call();
                
                // Mapped to typical TRC-20 staking variables: stakeOf() / balanceOfStaked() & earned() / rewardOf()
                // If named slightly differently inside compilation targets, modify methods below
                const staked = await (contract.stakeOf ? contract.stakeOf(userAddress) : contract.balanceOfStaked(userAddress)).call().catch(() => 0);
                const earned = await (contract.earned ? contract.earned(userAddress) : contract.rewardOf(userAddress)).call().catch(() => 0);

                document.getElementById('val-balance').innerText = (parseInt(balance._hex || balance) / divisor).toFixed(4);
                document.getElementById('val-staked').innerText = (parseInt(staked._hex || staked) / divisor).toFixed(4);
                document.getElementById('val-earned').innerText = (parseInt(earned._hex || earned) / divisor).toFixed(4);
            } catch(err) {
                console.warn("Error updating parameters:", err);
            }
        }

        async function executeStake() {
            if (!contract) return alert("Please connect wallet first.");
            const amountInput = document.getElementById('stake-amount').value;
            if (!amountInput || amountInput <= 0) return alert("Enter a valid amount.");

            const parsedValue = BigInt(Math.floor(parseFloat(amountInput) * Math.pow(10, decimals)));
            
            try {
                // Checks for standard stake method structures
                const tx = await (contract.stake ? contract.stake(parsedValue.toString()) : contract.startStake(parsedValue.toString())).send({
                    feeLimit: 150000000
                });
                alert("Stake transaction sent: " + tx);
                updateData();
            } catch(e) {
                alert("Staking transaction failed: " + (e.message || e));
            }
        }

        async function executeEndStake() {
            if (!contract) return alert("Please connect wallet first.");
            
            try {
                // Alternates between common naming metrics (withdraw, unstake, endStake)
                const method = contract.endStake || contract.unstake || contract.withdraw;
                if (!method) throw new Error("Unstaking method endpoint variant not resolved automatically.");

                const tx = await method().send({
                    feeLimit: 150000000
                });
                alert("End Stake transaction sent: " + tx);
                updateData();
            } catch(e) {
                alert("Unstaking transaction failed: " + (e.message || e));
            }
        }
    </script>
</body>
</html>
