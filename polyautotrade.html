<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 8px; }
        body { font-size: 12px; line-height: 1.2; background: #0b0e14; color: #cbd5e1; }
        .copy-success { color: #4ade80 !important; border-color: #4ade80 !important; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 p-3">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col items-center mb-3 text-center">
            <h1 class="text-xl font-black text-white italic uppercase tracking-tighter">Poly Monitor</h1>
            <p class="text-[8px] text-gray-500 uppercase tracking-[0.3em] -mt-1">developed by Freeberry</p>
            
            <div class="flex mt-2 w-full max-w-sm bg-[#161b22] border border-gray-700 rounded p-0.5 shadow-xl">
                <input type="text" id="wallet" class="bg-transparent px-2 py-1 text-[11px] font-mono w-full text-blue-400 outline-none" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="sync()" class="bg-blue-600 text-white px-3 py-1 rounded text-[9px] font-black uppercase hover:bg-blue-500 ml-1">Track</button>
            </div>
        </header>

        <div class="mb-4 bg-[#161b22] border border-blue-900/40 rounded-lg p-3">
            <div class="flex justify-between items-center mb-2 border-b border-gray-800 pb-1">
                <h3 class="text-[10px] font-black uppercase text-blue-400 tracking-widest flex items-center gap-2">
                    <span class="inline-block w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                    Behavioral Analysis Engine
                </h3>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="p-2 bg-black/40 rounded border border-gray-800">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[8px] font-bold text-orange-500 uppercase">BTC Bias</span>
                        <span id="btc-bias-tag" class="text-[7px] px-1 rounded bg-gray-700 font-black text-gray-300">Scanning...</span>
                    </div>
                    <div id="btc-recommendation" class="text-xs font-black text-center py-1 tracking-widest text-gray-500 uppercase">Awaiting Data</div>
                </div>
                <div class="p-2 bg-black/40 rounded border border-gray-800">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[8px] font-bold text-blue-500 uppercase">ETH Bias</span>
                        <span id="eth-bias-tag" class="text-[7px] px-1 rounded bg-gray-700 font-black text-gray-300">Scanning...</span>
                    </div>
                    <div id="eth-recommendation" class="text-xs font-black text-center py-1 tracking-widest text-gray-500 uppercase">Awaiting Data</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="space-y-2">
                <h2 class="bg-orange-600 text-black text-[9px] font-black py-0.5 rounded text-center uppercase">Bitcoin Monitor</h2>
                <div id="btc-5m-box"></div>
                <div id="btc-15m-box"></div>
            </div>
            <div class="space-y-2">
                <h2 class="bg-blue-600 text-black text-[9px] font-black py-0.5 rounded text-center uppercase">Ethereum Monitor</h2>
                <div id="eth-5m-box"></div>
                <div id="eth-15m-box"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div id="feed-btc" class="h-[35vh] overflow-y-auto custom-scrollbar space-y-1.5 pr-1 border-r border-gray-800/30"></div>
            <div id="feed-eth" class="h-[35vh] overflow-y-auto custom-scrollbar space-y-1.5 pr-1"></div>
        </div>

        <footer class="mt-6 pt-4 border-t border-gray-800 text-center">
            <p class="text-[8px] text-gray-600 uppercase mb-2 tracking-widest font-bold">Support the Developer</p>
            <div onclick="copyDonation()" id="donation-container" class="inline-flex items-center gap-2 bg-[#161b22] px-3 py-2 rounded-full border border-gray-700 cursor-pointer hover:border-blue-500 transition-all active:scale-95 group">
                <span id="donation-addr" class="text-[10px] font-mono text-blue-400">0x35607066C0Bf2495A20B70D64A7E00e281B94C85</span>
                <span id="copy-label" class="bg-blue-600 text-white text-[8px] px-1.5 py-0.5 rounded font-black uppercase group-hover:bg-blue-500">Copy</span>
            </div>
        </footer>
    </div>

    <script>
        let DATA = {};
        const ASSETS = ['btc', 'eth'];

        function copyDonation() {
            const addr = document.getElementById('donation-addr').innerText;
            const container = document.getElementById('donation-container');
            const label = document.getElementById('copy-label');
            
            navigator.clipboard.writeText(addr).then(() => {
                const originalLabel = label.innerText;
                label.innerText = "Copied!";
                label.classList.replace('bg-blue-600', 'bg-green-600');
                container.classList.add('copy-success');
                
                setTimeout(() => {
                    label.innerText = originalLabel;
                    label.classList.replace('bg-green-600', 'bg-blue-600');
                    container.classList.remove('copy-success');
                }, 2000);
            });
        }

        function initData() {
            ASSETS.forEach(a => { DATA[a] = { "5m": { upV: 0, downV: 0, upShares: 0, downShares: 0, upSpent: 0, downSpent: 0, upC: 0, downC: 0 }, "15m": { upV: 0, downV: 0, upShares: 0, downShares: 0, upSpent: 0, downSpent: 0, upC: 0, downC: 0 } }; });
        }

        async function sync() {
            const wallet = document.getElementById('wallet').value.trim();
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${wallet}&limit=60`);
                const trades = await res.json();
                initData();
                ASSETS.forEach(a => document.getElementById(`feed-${a}`).innerHTML = '');
                trades.forEach(t => {
                    const slug = (t.slug || "").toLowerCase();
                    const asset = ASSETS.find(a => slug.includes(a));
                    if (!asset) return;
                    const tf = slug.includes('15m') ? '15m' : '5m';
                    const isDown = t.outcomeIndex == "1";
                    const vol = parseFloat(t.usdcSize || 0);
                    const shares = parseFloat(t.size || 0);
                    if (isDown) { DATA[asset][tf].downV += vol; DATA[asset][tf].downShares += shares; DATA[asset][tf].downSpent += vol; DATA[asset][tf].downC++; }
                    else { DATA[asset][tf].upV += vol; DATA[asset][tf].upShares += shares; DATA[asset][tf].upSpent += vol; DATA[asset][tf].upC++; }
                    renderRow(asset, t);
                });
                updateUI();
                runAnalysis();
            } catch (err) { console.error(err); }
        }

        function runAnalysis() {
            ASSETS.forEach(asset => {
                const d = DATA[asset]["5m"];
                const total = d.upV + d.downV;
                const upRatio = total > 0 ? (d.upV / total) : 0.5;
                const tag = document.getElementById(`${asset}-bias-tag`);
                const rec = document.getElementById(`${asset}-recommendation`);
                let bias = "Neutral", color = "text-gray-400", recText = "SIDEWAYS";
                if (total > 500) {
                    if (upRatio > 0.65) { bias = "BULLISH"; color = "text-green-500"; recText = "EXPECT UP"; }
                    else if (upRatio < 0.35) { bias = "BEARISH"; color = "text-red-500"; recText = "EXPECT DOWN"; }
                }
                tag.innerText = bias;
                tag.className = `text-[7px] px-1 rounded font-black uppercase ${bias==='BULLISH'?'bg-green-900 text-green-200':bias==='BEARISH'?'bg-red-900 text-red-200':'bg-gray-700 text-gray-300'}`;
                rec.innerText = recText;
                rec.className = `text-xs font-black text-center py-1 tracking-widest ${color}`;
            });
        }

        function updateUI() {
            ASSETS.forEach(a => {
                ['5m', '15m'].forEach(tf => {
                    const d = DATA[a][tf];
                    const upPL = (d.upShares - d.upSpent).toFixed(2);
                    const downPL = (d.downShares - d.downSpent).toFixed(2);
                    const avgUp = d.upShares > 0 ? (d.upSpent / d.upShares * 100).toFixed(1) : "0.0";
                    const avgDown = d.downShares > 0 ? (d.downSpent / d.downShares * 100).toFixed(1) : "0.0";
                    const el = document.getElementById(`${a}-${tf}-box`);
                    if(el) el.innerHTML = `<div class="stat-card shadow-sm mb-2"><div class="flex justify-between items-center mb-1 text-[8px] font-mono uppercase font-bold text-blue-400"><span>${tf}</span></div><div class="grid grid-cols-2 gap-2"><div class="bg-black/40 p-1.5 rounded border-l-2 border-green-600"><div class="flex justify-between items-center text-[7px] font-bold mb-1"><div class="text-gray-500 uppercase">UP</div><div class="${upPL>=0?'text-green-400':'text-red-400'}">$${upPL}</div></div><div class="text-lg font-black text-green-400 leading-none">${d.upC} <span class="text-[9px] text-gray-600 font-normal">$${Math.round(d.upV)}</span></div><div class="text-[8px] text-gray-400 font-mono mt-1">${avgUp}¢</div></div><div class="bg-black/40 p-1.5 rounded border-l-2 border-red-600"><div class="flex justify-between items-center text-[7px] font-bold mb-1"><div class="text-gray-500 uppercase">DOWN</div><div class="${downPL>=0?'text-green-400':'text-red-400'}">$${downPL}</div></div><div class="text-lg font-black text-red-400 leading-none">${d.downC} <span class="text-[9px] text-gray-600 font-normal">$${Math.round(d.downV)}</span></div><div class="text-[8px] text-gray-400 font-mono mt-1">${avgDown}¢</div></div></div></div>`;
                });
            });
        }

        function renderRow(asset, t) {
            const isDown = t.outcomeIndex == "1";
            const price = (parseFloat(t.usdcSize) / parseFloat(t.size)).toFixed(2);
            const html = `<div class="bg-[#161b22] border border-gray-800 rounded p-1.5 text-[9px]"><div class="flex justify-between text-[7px] text-gray-500 mb-0.5 font-mono uppercase"><span>${t.slug.includes('15m')?'15M':'5M'}</span><span>${new Date(t.timestamp*1000).toLocaleTimeString()}</span></div><div class="flex justify-between items-center bg-black/30 p-1 rounded"><span class="${isDown?'text-red-500':'text-green-500'} font-black uppercase">${isDown?'Down':'Up'}</span><span class="text-yellow-500 font-bold">${price}¢</span><span class="text-blue-400 font-bold">$${Math.round(t.usdcSize)}</span></div></div>`;
            document.getElementById(`feed-${asset}`).insertAdjacentHTML('beforeend', html);
        }

        setInterval(sync, 10000);
        sync();
    </script>
</body>
</html>
