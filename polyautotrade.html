<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly Monitor | Behavioral Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 8px; }
        body { font-size: 12px; line-height: 1.2; background: #0b0e14; color: #e2e8f0; font-family: ui-monospace, monospace; }
        .header-glow-btc { box-shadow: 0 0 15px rgba(234, 179, 8, 0.1); }
        .header-glow-eth { box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="p-3">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col items-center mb-6 text-center">
            <h1 class="text-xl font-black text-white italic uppercase tracking-tighter">Poly Monitor</h1>
            <p class="text-[8px] text-gray-500 uppercase tracking-[0.3em] -mt-1">developed by Freeberry</p>
            
            <div class="flex mt-3 w-full max-w-sm bg-[#161b22] border border-gray-700 rounded p-0.5 shadow-xl">
                <input type="text" id="wallet" class="bg-transparent px-2 py-1 text-[11px] w-full text-blue-400 outline-none" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="sync()" class="bg-blue-600 text-white px-3 py-1 rounded text-[9px] font-black uppercase hover:bg-blue-500 ml-1">Track Wallet</button>
            </div>
        </header>

        <div class="mb-5 bg-[#161b22] border border-blue-900/40 rounded-lg p-3 shadow-inner">
            <div class="flex justify-between items-center mb-2 border-b border-gray-800 pb-1">
                <h3 class="text-[10px] font-black uppercase text-blue-400 tracking-widest flex items-center gap-2">
                    <span class="inline-block w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                    Whale Intelligence Engine
                </h3>
                <span class="text-[8px] text-gray-600 font-bold uppercase" id="sync-timer">Syncing...</span>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="p-2 bg-black/40 rounded border border-gray-800">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[8px] font-bold text-orange-500 uppercase">BTC Bias</span>
                        <span id="btc-bias-tag" class="text-[7px] px-1 rounded bg-gray-700 font-black uppercase text-gray-400">Neutral</span>
                    </div>
                    <div id="btc-recommendation" class="text-xs font-black text-center py-1 tracking-widest text-gray-600 uppercase">Insufficient Data</div>
                </div>
                <div class="p-2 bg-black/40 rounded border border-gray-800">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[8px] font-bold text-blue-500 uppercase">ETH Bias</span>
                        <span id="eth-bias-tag" class="text-[7px] px-1 rounded bg-gray-700 font-black uppercase text-gray-400">Neutral</span>
                    </div>
                    <div id="eth-recommendation" class="text-xs font-black text-center py-1 tracking-widest text-gray-600 uppercase">Insufficient Data</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="space-y-2">
                <h2 class="bg-orange-600 text-black text-[10px] font-black py-1 rounded text-center uppercase tracking-tighter header-glow-btc">Bitcoin Monitor</h2>
                <div id="btc-5m-box"></div>
                <div id="btc-15m-box"></div>
            </div>
            <div class="space-y-2">
                <h2 class="bg-blue-600 text-black text-[10px] font-black py-1 rounded text-center uppercase tracking-tighter header-glow-eth">Ethereum Monitor</h2>
                <div id="eth-5m-box"></div>
                <div id="eth-15m-box"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-1.5 h-[40vh] overflow-y-auto custom-scrollbar pr-1 border-r border-gray-800/30" id="feed-btc"></div>
            <div class="space-y-1.5 h-[40vh] overflow-y-auto custom-scrollbar pr-1" id="feed-eth"></div>
        </div>
    </div>

    <script>
        let DATA = {};
        const ASSETS = ['btc', 'eth'];

        function initData() {
            ASSETS.forEach(a => { 
                DATA[a] = { 
                    "5m": { upV: 0, downV: 0, upShares: 0, downShares: 0, upSpent: 0, downSpent: 0, upC: 0, downC: 0 }, 
                    "15m": { upV: 0, downV: 0, upShares: 0, downShares: 0, upSpent: 0, downSpent: 0, upC: 0, downC: 0 } 
                }; 
            });
        }

        async function sync() {
            const wallet = document.getElementById('wallet').value.trim();
            if(!wallet) return;
            
            document.getElementById('sync-timer').innerText = "UPDATING...";
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${wallet}&limit=60`);
                const trades = await res.json();
                initData();
                ASSETS.forEach(a => document.getElementById(`feed-${a}`).innerHTML = '');

                trades.forEach(t => {
                    const slug = (t.slug || "").toLowerCase();
                    const asset = ASSETS.find(a => slug.includes(a));
                    if (!asset) return;
                    
                    const tf = slug.includes('15m') ? '15m' : '5m';
                    const isDown = t.outcomeIndex == "1" || (t.outcome || "").toLowerCase().includes("down");
                    const vol = parseFloat(t.usdcSize || 0);
                    const shares = parseFloat(t.size || 0);

                    if (isDown) { 
                        DATA[asset][tf].downV += vol; DATA[asset][tf].downShares += shares; DATA[asset][tf].downSpent += vol; DATA[asset][tf].downC++; 
                    } else { 
                        DATA[asset][tf].upV += vol; DATA[asset][tf].upShares += shares; DATA[asset][tf].upSpent += vol; DATA[asset][tf].upC++; 
                    }
                    renderRow(asset, t);
                });

                updateUI();
                runAnalysis();
                document.getElementById('sync-timer').innerText = "STABLE";
            } catch (err) { 
                console.error(err); 
                document.getElementById('sync-timer').innerText = "SYNC ERR";
            }
        }

        function runAnalysis() {
            ASSETS.forEach(asset => {
                const d = DATA[asset]["5m"];
                const total = d.upV + d.downV;
                const upRatio = total > 0 ? (d.upV / total) : 0.5;
                const tag = document.getElementById(`${asset}-bias-tag`);
                const rec = document.getElementById(`${asset}-recommendation`);
                
                let bias = "Neutral", color = "text-gray-500", recText = "WAITING FOR FLOW";

                if (total > 300) {
                    if (upRatio > 0.60) { bias = "BULLISH"; color = "text-green-500"; recText = "WHALE ACCUMULATING"; }
                    else if (upRatio < 0.40) { bias = "BEARISH"; color = "text-red-500"; recText = "WHALE SHORTING"; }
                    else { bias = "HEDGING"; color = "text-yellow-500"; recText = "MIXED SIGNALS"; }
                }

                tag.innerText = bias;
                tag.className = `text-[7px] px-1 rounded font-black uppercase ${bias==='BULLISH'?'bg-green-900 text-green-200':bias==='BEARISH'?'bg-red-900 text-red-200':bias==='HEDGING'?'bg-yellow-900 text-yellow-200':'bg-gray-700 text-gray-300'}`;
                rec.innerText = recText;
                rec.className = `text-xs font-black text-center py-1 tracking-widest ${color}`;
            });
        }

        function updateUI() {
            ASSETS.forEach(a => {
                ['5m', '15m'].forEach(tf => {
                    const d = DATA[a][tf];
                    const upPL = (d.upShares - d.upSpent).toFixed(2);
                    const downPL = (d.downShares - d.downSpent).toFixed(2);
                    const avgUp = d.upShares > 0 ? (d.upSpent / d.upShares * 100).toFixed(1) : "0.0";
                    const avgDown = d.downShares > 0 ? (d.downSpent / d.downShares * 100).toFixed(1) : "0.0";
                    const el = document.getElementById(`${a}-${tf}-box`);
                    
                    if(el) el.innerHTML = `
                        <div class="stat-card shadow-sm mb-2">
                            <div class="flex justify-between items-center mb-1 text-[8px] font-mono uppercase font-bold text-gray-500">
                                <span>${tf} Window</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="bg-black/40 p-1.5 rounded border-l-2 border-green-600">
                                    <div class="flex justify-between items-center text-[7px] font-bold mb-1">
                                        <div class="text-green-500">UP</div>
                                        <div class="${upPL>=0?'text-green-400':'text-red-400'}">P&L: $${upPL}</div>
                                    </div>
                                    <div class="text-lg font-black text-white">${d.upC} <span class="text-[9px] text-gray-500">$${Math.round(d.upV)}</span></div>
                                    <div class="text-[8px] text-gray-400 mt-1 uppercase font-mono">Entry: <span class="text-white">${avgUp}¢</span></div>
                                </div>
                                <div class="bg-black/40 p-1.5 rounded border-l-2 border-red-600">
                                    <div class="flex justify-between items-center text-[7px] font-bold mb-1">
                                        <div class="text-red-500">DOWN</div>
                                        <div class="${downPL>=0?'text-green-400':'text-red-400'}">P&L: $${downPL}</div>
                                    </div>
                                    <div class="text-lg font-black text-white">${d.downC} <span class="text-[9px] text-gray-500">$${Math.round(d.downV)}</span></div>
                                    <div class="text-[8px] text-gray-400 mt-1 uppercase font-mono">Entry: <span class="text-white">${avgDown}¢</span></div>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function renderRow(asset, t) {
            const isDown = t.outcomeIndex == "1";
            const price = (parseFloat(t.usdcSize) / parseFloat(t.size)).toFixed(2);
            const html = `
                <div class="bg-[#161b22] border border-gray-800 rounded p-1.5 text-[9px]">
                    <div class="flex justify-between text-[7px] text-gray-500 mb-0.5 font-mono uppercase">
                        <span>${t.slug.includes('15m')?'15M':'5M'}</span>
                        <span>${new Date(t.timestamp*1000).toLocaleTimeString()}</span>
                    </div>
                    <div class="flex justify-between items-center bg-black/20 p-1 rounded">
                        <span class="${isDown?'text-red-500':'text-green-500'} font-black uppercase">${isDown?'Down':'Up'}</span>
                        <span class="text-yellow-500 font-bold">${price}¢</span>
                        <span class="text-blue-400 font-bold">$${Math.round(t.usdcSize)}</span>
                    </div>
                </div>`;
            document.getElementById(`feed-${asset}`).insertAdjacentHTML('beforeend', html);
        }

        setInterval(sync, 10000);
        sync();
    </script>
</body>
</html>
