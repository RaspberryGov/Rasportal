<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 8px; position: relative; }
        body { font-size: 12px; line-height: 1.2; background: #0b0e14; color: #cbd5e1; }
        
        #donation-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        
        /* Timer States */
        .timer-badge { font-family: monospace; font-size: 9px; font-weight: 900; padding: 1px 4px; border-radius: 2px; }
        .state-normal { background: rgba(0,0,0,0.4); color: #94a3b8; }
        .state-syncing { background: #eab308; color: #000; animation: sync-pulse 1.5s infinite; }
        .state-critical { background: #ef4444; color: #fff; animation: critical-flash 0.8s infinite; }

        @keyframes sync-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes critical-flash { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .intensity-bar { transition: width 0.8s ease; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 p-3">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col items-center mb-4 text-center">
            <h1 class="text-xl font-black text-white italic uppercase tracking-tighter">Poly Monitor</h1>
            <p class="text-[8px] text-gray-500 uppercase tracking-[0.3em] -mt-1">developed by Freeberry</p>
            
            <div class="flex gap-2 mt-4 w-full max-w-lg items-center">
                <div class="flex flex-1 bg-[#161b22] border border-gray-700 rounded p-0.5 shadow-xl">
                    <input type="text" id="wallet" class="bg-transparent px-2 py-1 text-[11px] font-mono w-full text-blue-400 outline-none" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                    <button onclick="sync()" class="bg-blue-600 text-white px-3 py-1 rounded text-[9px] font-black uppercase hover:bg-blue-500 ml-1 transition-colors">Track</button>
                </div>
                <button onclick="toggleModal(true)" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded text-[9px] font-black uppercase shadow-lg transition-all">Donate</button>
            </div>
        </header>

        <div id="donation-modal">
            <div class="bg-[#161b22] border border-gray-600 p-8 rounded-lg max-w-sm w-full text-center shadow-2xl">
                <h2 class="text-white font-black uppercase text-sm mb-2 italic">Support Freeberry</h2>
                <div class="bg-black/60 p-4 rounded border border-gray-800 break-all font-mono text-blue-400 text-[11px] mb-6 select-all">
                    0xE54AA4F86317457D6E89250A55BA9982538dA4Eb
                </div>
                <button onclick="copyToClipboard()" id="copy-btn" class="w-full bg-blue-600 text-white py-3 rounded text-[10px] font-black uppercase">Copy Address</button>
                <button onclick="toggleModal(false)" class="w-full mt-2 text-gray-500 text-[9px] uppercase font-bold">Close</button>
            </div>
        </div>

        <div class="mb-4 bg-[#161b22] border border-blue-900/40 rounded-lg p-3">
            <div class="grid grid-cols-2 gap-3">
                <div class="p-2 bg-black/40 rounded border border-gray-800">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[8px] font-bold text-orange-500 uppercase">BTC Bias</span>
                        <span id="btc-bias-tag" class="text-[7px] px-1 rounded bg-gray-700 font-black">Scanning...</span>
                    </div>
                    <div id="btc-recommendation" class="text-xs font-black text-center py-1 tracking-widest text-gray-500 uppercase italic">Awaiting</div>
                    <div class="mt-2"><div class="w-full bg-gray-900 h-1 rounded-full overflow-hidden"><div id="btc-intensity-bar" class="intensity-bar h-full bg-blue-500" style="width: 0%"></div></div></div>
                </div>
                <div class="p-2 bg-black/40 rounded border border-gray-800">
                    <div class="flex justify-between items-center mb-1 text-blue-500">
                        <span class="text-[8px] font-bold uppercase">ETH Bias</span>
                        <span id="eth-bias-tag" class="text-[7px] px-1 rounded bg-gray-700 font-black text-gray-300">Scanning...</span>
                    </div>
                    <div id="eth-recommendation" class="text-xs font-black text-center py-1 tracking-widest text-gray-500 uppercase italic">Awaiting</div>
                    <div class="mt-2"><div class="w-full bg-gray-900 h-1 rounded-full overflow-hidden"><div id="eth-intensity-bar" class="intensity-bar h-full bg-blue-500" style="width: 0%"></div></div></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="space-y-2">
                <div class="bg-orange-600 px-2 py-0.5 rounded shadow-md text-black font-black uppercase text-[9px]">BTC Monitor</div>
                <div id="btc-5m-box"></div>
                <div id="btc-15m-box"></div>
            </div>
            <div class="space-y-2">
                <div class="bg-blue-600 px-2 py-0.5 rounded shadow-md text-black font-black uppercase text-[9px]">ETH Monitor</div>
                <div id="eth-5m-box"></div>
                <div id="eth-15m-box"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div id="feed-btc" class="h-[35vh] overflow-y-auto custom-scrollbar space-y-2 pr-1 border-r border-gray-800/30"></div>
            <div id="feed-eth" class="h-[35vh] overflow-y-auto custom-scrollbar space-y-2 pr-1"></div>
        </div>
    </div>

    <script>
        const ADDR = "0xE54AA4F86317457D6E89250A55BA9982538dA4Eb";
        let DATA = {};
        const ASSETS = ['btc', 'eth'];

        function toggleModal(show) { document.getElementById('donation-modal').style.display = show ? 'flex' : 'none'; }
        function copyToClipboard() {
            navigator.clipboard.writeText(ADDR).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.innerText = "COPIED!";
                setTimeout(() => { btn.innerText = "COPY ADDRESS"; }, 2000);
            });
        }

        function getTimerInfo(mins) {
            const now = new Date();
            const msPassed = now.getTime() % (mins * 60 * 1000);
            const msRemaining = (mins * 60 * 1000) - msPassed;
            const sRem = Math.floor(msRemaining / 1000);
            const m = Math.floor(sRem / 60);
            const s = sRem % 60;
            
            let label = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            let className = "state-normal";

            if (msPassed <= 30000) { label = "SYNCING"; className = "state-syncing"; }
            else if (sRem <= 30) { className = "state-critical"; }

            return { label, className };
        }

        function updateAllTimers() {
            ASSETS.forEach(a => {
                ['5m', '15m'].forEach(tf => {
                    const info = getTimerInfo(parseInt(tf));
                    const el = document.getElementById(`${a}-${tf}-timer`);
                    if (el) { el.innerText = info.label; el.className = `timer-badge ${info.className}`; }
                });
            });
        }

        function initData() { ASSETS.forEach(a => { DATA[a] = { "5m": { upV: 0, downV: 0, upC: 0, downC: 0 }, "15m": { upV: 0, downV: 0, upC: 0, downC: 0 } }; }); }

        async function sync() {
            const wallet = document.getElementById('wallet').value.trim();
            if(!wallet) return;
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${wallet}&limit=60`);
                const trades = await res.json();
                initData();
                ASSETS.forEach(a => document.getElementById(`feed-${a}`).innerHTML = '');
                trades.forEach(t => {
                    const slug = (t.slug || "").toLowerCase();
                    const asset = ASSETS.find(a => slug.includes(a));
                    if (!asset) return;
                    const tf = slug.includes('15m') ? '15m' : '5m';
                    const isDown = t.outcomeIndex == "1";
                    const vol = parseFloat(t.usdcSize || 0);
                    if (isDown) { DATA[asset][tf].downV += vol; DATA[asset][tf].downC++; }
                    else { DATA[asset][tf].upV += vol; DATA[asset][tf].upC++; }
                    renderRow(asset, t);
                });
                updateUI();
            } catch (err) { console.error(err); }
        }

        function updateUI() {
            ASSETS.forEach(a => {
                ['5m', '15m'].forEach(tf => {
                    const d = DATA[a][tf];
                    const el = document.getElementById(`${a}-${tf}-box`);
                    if(el) el.innerHTML = `
                        <div class="stat-card border border-gray-800">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[8px] font-black text-blue-400 uppercase tracking-tighter">${tf} WINDOW</span>
                                <span id="${a}-${tf}-timer" class="timer-badge state-normal">--:--</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="bg-black/40 p-1.5 rounded border-l-2 border-green-600">
                                    <div class="text-[7px] text-gray-500 font-bold uppercase">UP</div>
                                    <div class="text-xs font-black text-green-400">${d.upC} <span class="text-[8px] text-gray-600 font-normal">$${Math.round(d.upV)}</span></div>
                                </div>
                                <div class="bg-black/40 p-1.5 rounded border-l-2 border-red-600">
                                    <div class="text-[7px] text-gray-500 font-bold uppercase">DN</div>
                                    <div class="text-xs font-black text-red-400">${d.downC} <span class="text-[8px] text-gray-600 font-normal">$${Math.round(d.downV)}</span></div>
                                </div>
                            </div>
                        </div>`;
                });
            });
            updateAllTimers(); // Immediate refresh after UI build
        }

        function renderRow(asset, t) {
            const isDown = t.outcomeIndex == "1";
            const price = (parseFloat(t.usdcSize) / parseFloat(t.size)).toFixed(2);
            const html = `<div class="bg-[#161b22] border border-gray-800 rounded p-2 mb-1 shadow-sm"><div class="text-[7px] text-gray-500 uppercase font-black mb-1 truncate">${t.title || "Market"}</div><div class="flex justify-between items-center"><span class="${isDown?'text-red-500':'text-green-500'} font-black uppercase text-[8px]">${isDown?'Down':'Up'}</span><span class="text-yellow-500 font-bold font-mono text-[9px]">${price}¢</span><span class="text-blue-400 font-bold font-mono text-[9px]">$${Math.round(t.usdcSize)}</span></div></div>`;
            document.getElementById(`feed-${asset}`).insertAdjacentHTML('beforeend', html);
        }

        setInterval(updateAllTimers, 1000);
        setInterval(sync, 10000);
        sync();
    </script>
</body>
</html>
