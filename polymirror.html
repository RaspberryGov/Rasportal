<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Pro Quant Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .stat-box { background: rgba(0, 0, 0, 0.2); border-radius: 4px; padding: 4px; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .timer-active { animation: flash 2s infinite; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-2">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col mb-4 gap-2 items-center text-center">
            <h1 class="text-xl font-black text-white italic tracking-tighter">POLY <span class="text-blue-500">QUANT DASHBOARD</span></h1>
            <div class="flex items-center bg-[#161b22] border border-gray-800 rounded-lg p-1 w-full max-w-md shadow-xl">
                <input type="text" id="wallet-input" class="bg-transparent text-xs font-mono px-3 py-1.5 w-full outline-none text-blue-400" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="updateUser()" class="bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded uppercase hover:bg-blue-500 transition-colors">Sync</button>
            </div>
            <div id="status-bar" class="text-[8px] font-mono text-gray-500 uppercase tracking-widest">Awaiting Live Feed...</div>
        </header>

        <div id="analytics-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-6"></div>

        <hr class="border-gray-800/50 mb-6">

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="flex flex-col h-[55vh]"><h2 class="bg-orange-500 text-black text-[10px] font-black p-1.5 mb-2 rounded text-center">BTC LIVE</h2><div id="col-btc" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[55vh]"><h2 class="bg-blue-500 text-black text-[10px] font-black p-1.5 mb-2 rounded text-center">ETH LIVE</h2><div id="col-eth" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[55vh]"><h2 class="bg-purple-500 text-black text-[10px] font-black p-1.5 mb-2 rounded text-center">SOL LIVE</h2><div id="col-sol" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[55vh]"><h2 class="bg-teal-500 text-black text-[10px] font-black p-1.5 mb-2 rounded text-center">XRP LIVE</h2><div id="col-xrp" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
        </div>
    </div>

    <script>
        let CURRENT_USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth', 'sol', 'xrp'];
        let stats = {};

        function resetStats() {
            ASSETS.forEach(a => {
                stats[a] = {
                    "5 MINUTE": { upCount: 0, upVol: 0, downCount: 0, downVol: 0, timer: "00:00" },
                    "15 MINUTE": { upCount: 0, upVol: 0, downCount: 0, downVol: 0, timer: "00:00" }
                };
            });
        }

        // Logic to get time remaining for the specific market intervals
        function getMarketTimer(interval) {
            const now = new Date();
            const mins = now.getMinutes();
            const secs = now.getSeconds();
            const nextMark = Math.ceil((mins + 0.1) / interval) * interval;
            let remMins = nextMark - mins - 1;
            let remSecs = 60 - secs;
            if (remSecs === 60) { remSecs = 0; remMins++; }
            return `${String(remMins).padStart(2, '0')}:${String(remSecs).padStart(2, '0')}`;
        }

        function isCurrentMarket(title, interval) {
            const timeRegex = /(\d{1,2}):(\d{2})(AM|PM|am|pm)-(\d{1,2}):(\d{2})(AM|PM|am|pm)/;
            const match = title.match(timeRegex);
            if (!match) return false;
            
            // Extract the end time of the market from title
            let h2 = parseInt(match[4]); const m2 = parseInt(match[5]); const p2 = match[6].toLowerCase();
            if (p2 === 'pm' && h2 < 12) h2 += 12; if (p2 === 'am' && h2 === 12) h2 = 0;

            const now = new Date();
            const marketEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h2, m2);
            
            // If the market end time is in the past, it's not the live market
            return marketEnd > now;
        }

        async function sync() {
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${CURRENT_USER}&limit=100`);
                const data = await res.json();
                resetStats();
                ASSETS.forEach(id => document.getElementById(`col-${id}`).innerHTML = '');

                data.forEach(item => {
                    const title = item.title;
                    if (!title.toLowerCase().includes('up or down')) return;

                    let assetKey = null;
                    if (title.toLowerCase().includes('btc')) assetKey = 'btc';
                    else if (title.toLowerCase().includes('eth')) assetKey = 'eth';
                    else if (title.toLowerCase().includes('sol')) assetKey = 'sol';
                    else if (title.toLowerCase().includes('xrp')) assetKey = 'xrp';

                    if (assetKey) {
                        const is5m = title.includes('5 min');
                        const interval = is5m ? 5 : 15;
                        const durationLabel = is5m ? "5 MINUTE" : "15 MINUTE";

                        // ONLY count if this market is the currently active one
                        if (isCurrentMarket(title, interval)) {
                            const isDown = (item.outcomeIndex == "1") || (item.outcome?.toLowerCase() === 'no') || (item.outcome?.toLowerCase() === 'down');
                            const direction = isDown ? "DOWN" : "UP";
                            const vol = parseFloat(item.usdcSize) || 0;

                            if (direction === "UP") { 
                                stats[assetKey][durationLabel].upCount++; 
                                stats[assetKey][durationLabel].upVol += vol; 
                            } else { 
                                stats[assetKey][durationLabel].downCount++; 
                                stats[assetKey][durationLabel].downVol += vol; 
                            }
                        }
                        renderCard(assetKey, item, durationLabel);
                    }
                });
                renderAnalytics();
            } catch (e) { console.error(e); }
        }

        function renderAnalytics() {
            const container = document.getElementById('analytics-grid');
            container.innerHTML = '';
            ASSETS.forEach(a => {
                const color = a === 'btc' ? 'orange-500' : a === 'eth' ? 'blue-500' : a === 'sol' ? 'purple-500' : 'teal-500';
                const div = document.createElement('div');
                div.className = "bg-[#161b22] border border-gray-800 rounded-lg overflow-hidden shadow-lg";
                div.innerHTML = `
                    <div class="bg-${color} text-black text-[9px] font-black py-1 px-3 flex justify-between uppercase">
                        <span>${a} LIVE STATS</span>
                    </div>
                    <div class="p-2 space-y-3">
                        ${renderMarketBlock(a, "5 MINUTE", 5)}
                        ${renderMarketBlock(a, "15 MINUTE", 15)}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderMarketBlock(asset, label, interval) {
            const data = stats[asset][label];
            const timer = getMarketTimer(interval);
            return `
                <div>
                    <div class="flex justify-between items-center border-b border-gray-800/50 pb-1 mb-1">
                        <span class="text-[8px] text-gray-500 font-black uppercase">${label}</span>
                        <span class="text-[9px] font-mono text-yellow-500 timer-active">ENDS IN: ${timer}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="stat-box border-l-2 border-green-500/50">
                            <div class="text-[7px] text-gray-400 font-bold uppercase">Buy UP</div>
                            <div class="text-[10px] font-black text-green-400">${data.upCount} <span class="text-[8px] text-gray-500 ml-1">$${Math.round(data.upVol)}</span></div>
                        </div>
                        <div class="stat-box border-l-2 border-red-500/50">
                            <div class="text-[7px] text-gray-400 font-bold uppercase">Buy DOWN</div>
                            <div class="text-[10px] font-black text-red-400">${data.downCount} <span class="text-[8px] text-gray-500 ml-1">$${Math.round(data.downVol)}</span></div>
                        </div>
                    </div>
                </div>`;
        }

        function renderCard(columnId, item, duration) {
            const isDown = (item.outcomeIndex == "1") || (item.outcome?.toLowerCase() === 'no') || (item.outcome?.toLowerCase() === 'down');
            const direction = isDown ? "DOWN" : "UP";
            const side = item.side?.toUpperCase() || "UNKNOWN";
            const sharePrice = (parseFloat(item.usdcSize) / parseFloat(item.size)).toFixed(2);
            const html = `
                <div class="bg-[#161b22] border border-gray-800 rounded p-2 hover:border-blue-500/40 transition-all shadow-md">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[8px] font-black text-blue-400 bg-blue-500/10 px-1 rounded uppercase">${duration}</span>
                        <span class="text-[9px] text-gray-500 font-mono">${new Date(item.timestamp*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
                    </div>
                    <div class="text-[10px] font-bold text-gray-300 truncate">${item.title}</div>
                    <div class="grid grid-cols-3 gap-1 bg-black/30 p-1 mt-2 rounded text-center border border-gray-800/50">
                        <div><div class="text-[6px] text-gray-500">POS</div><div class="text-[9px] font-black ${direction==='UP'?'text-green-500':'text-red-500'}">${direction}</div></div>
                        <div><div class="text-[6px] text-gray-500">PRC</div><div class="text-[9px] font-mono text-yellow-500">${sharePrice}¢</div></div>
                        <div><div class="text-[6px] text-gray-500">VOL</div><div class="text-[9px] font-mono text-blue-400">$${Math.round(item.usdcSize)}</div></div>
                    </div>
                </div>`;
            document.getElementById(`col-${columnId}`).insertAdjacentHTML('beforeend', html);
        }

        function updateUser() {
            const val = document.getElementById('wallet-input').value.trim();
            if (val.length === 42) { CURRENT_USER = val; sync(); }
        }

        // Initialize and Timers
        setInterval(sync, 10000); 
        setInterval(renderAnalytics, 1000); // Smooth countdown update every second
        sync();
    </script>
</body>
</html>
