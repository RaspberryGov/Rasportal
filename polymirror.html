<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Tracker: @rename</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-4 md:p-8 font-sans">
    <div class="max-w-3xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight">@rename <span class="text-blue-500">Monitor</span></h1>
                <p class="text-slate-400 text-sm">Targeting BTC 5m & 15m Markets</p>
            </div>
            <button onclick="fetchData()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-500 active:scale-95 px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">
                Refresh Feed
            </button>
        </header>

        <section class="space-y-6">
            <div>
                <h2 class="text-xs font-bold uppercase tracking-widest text-blue-400 mb-3 ml-1">Live Positions</h2>
                <div id="live-container" class="grid gap-4">
                    <div class="animate-pulse bg-slate-800 h-24 rounded-xl"></div>
                </div>
            </div>

            <hr class="border-slate-800">

            <div>
                <h2 class="text-xs font-bold uppercase tracking-widest text-emerald-400 mb-3 ml-1">Recent History (Closed)</h2>
                <div id="history-container" class="grid gap-3 opacity-80">
                    <div class="animate-pulse bg-slate-800 h-16 rounded-xl"></div>
                </div>
            </div>
        </section>

        <footer class="mt-12 text-center text-slate-600 text-xs">
            Auto-refreshes every 30s • Data via Polymarket API
        </footer>
    </div>

    <script>
        const PROXY_ADDRESS = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";

        async function fetchData() {
            try {
                // Fetch Active Positions
                const activeRes = await fetch(`https://data-api.polymarket.com/positions?user=${PROXY_ADDRESS}`);
                const activeData = await activeRes.json();

                // Fetch Closed Positions (History)
                const historyRes = await fetch(`https://data-api.polymarket.com/positions/closed?user=${PROXY_ADDRESS}&limit=5`);
                const historyData = await historyRes.json();

                renderActive(activeData);
                renderHistory(historyData);
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function renderActive(data) {
            const container = document.getElementById('live-container');
            const btcMarkets = data.filter(p => p.title.toLowerCase().includes("btc"));

            if (btcMarkets.length === 0) {
                container.innerHTML = `<div class="bg-slate-800/50 border border-slate-700 p-6 rounded-xl text-slate-500 italic text-center">No active BTC positions found.</div>`;
                return;
            }

            container.innerHTML = btcMarkets.map(pos => `
                <div class="bg-slate-800 border-l-4 ${pos.outcome.toLowerCase() === 'up' ? 'border-green-500' : 'border-red-500'} p-5 rounded-xl shadow-xl">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-sm font-bold text-slate-300">${pos.title}</span>
                        <span class="px-2 py-1 rounded text-[10px] font-bold bg-blue-500/20 text-blue-400 uppercase">Live</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <div class="text-[10px] text-slate-500 uppercase font-bold">Direction</div>
                            <div class="text-xl font-black ${pos.outcome.toLowerCase() === 'up' ? 'text-green-400' : 'text-red-400'}">${pos.outcome.toUpperCase()}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] text-slate-500 uppercase font-bold">Size / Price</div>
                            <div class="font-mono text-white">${Math.round(pos.size)} @ $${parseFloat(pos.avgPrice).toFixed(2)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderHistory(data) {
            const container = document.getElementById('history-container');
            const btcHistory = data.filter(p => p.title.toLowerCase().includes("btc"));

            if (btcHistory.length === 0) {
                container.innerHTML = `<div class="text-slate-600 text-sm italic p-2">No recent history found.</div>`;
                return;
            }

            container.innerHTML = btcHistory.map(pos => `
                <div class="flex justify-between items-center bg-slate-800/40 p-3 rounded-lg border border-slate-700/50">
                    <div>
                        <div class="text-[10px] text-slate-500">${pos.title.substring(0, 30)}...</div>
                        <div class="text-sm font-bold ${pos.outcome.toLowerCase() === 'up' ? 'text-green-600' : 'text-red-600'}">${pos.outcome.toUpperCase()}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] text-slate-500">Result</div>
                        <div class="text-xs font-mono font-bold ${pos.pnl > 0 ? 'text-green-400' : 'text-slate-400'}">
                            ${pos.pnl > 0 ? '+' : ''}$${parseFloat(pos.pnl).toFixed(2)}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Run on load
        fetchData();
        // Auto-refresh every 30 seconds
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
