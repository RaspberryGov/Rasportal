<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Monitor: @rename</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">@rename Position Monitor</h1>
                <p class="text-gray-400 text-sm">BTC Up/Down (5m & 15m Markets)</p>
            </div>
            <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-semibold transition">
                Refresh Data
            </button>
        </header>

        <div id="status" class="mb-4 text-center hidden">
            <span class="animate-pulse text-yellow-500">Fetching latest positions...</span>
        </div>

        <div class="grid gap-6">
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
                <h2 class="text-xl font-semibold mb-4 text-gray-200">BTC Up or Down - 5 Minutes</h2>
                <div id="market-5m" class="space-y-2 text-gray-300 italic">No active position found.</div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
                <h2 class="text-xl font-semibold mb-4 text-gray-200">BTC Up or Down - 15 Minutes</h2>
                <div id="market-15m" class="space-y-2 text-gray-300 italic">No active position found.</div>
            </div>
        </div>
    </div>

    <script>
        // Replace with the actual proxy wallet address of @rename
        // You can find this by clicking their profile on Polymarket
        const USER_ADDRESS = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d"; 
        
        // Market Condition IDs (Targeted)
        const MARKET_15M_ID = "0xdd22472e552920b8438158ea7238bfadfa4f736aa4cee91a6b86c39ead110917"; // Example ID
        const MARKET_5M_ID = "0x..."; // Dynamic ID

        async function fetchData() {
            const status = document.getElementById('status');
            status.classList.remove('hidden');

            try {
                const response = await fetch(`https://data-api.polymarket.com/positions?user=${USER_ADDRESS}`);
                const positions = await response.json();
                
                renderMarket('market-5m', positions, "5 Minutes");
                renderMarket('market-15m', positions, "15 Minutes");

            } catch (error) {
                console.error("API Error:", error);
                alert("Failed to fetch data from Polymarket API.");
            } finally {
                status.classList.add('hidden');
            }
        }

        function renderMarket(elementId, data, searchString) {
            const container = document.getElementById(elementId);
            // Filter positions by the market title string
            const filtered = data.filter(p => p.title.includes(searchString));

            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-gray-500 italic">No current positions.</p>`;
                return;
            }

            container.innerHTML = filtered.map(pos => `
                <div class="flex justify-between items-center bg-gray-750 p-3 rounded border border-gray-600">
                    <div>
                        <span class="block text-xs uppercase text-gray-500">Direction</span>
                        <span class="font-bold ${pos.outcome === 'Up' ? 'text-green-400' : 'text-red-400'}">
                            ${pos.outcome.toUpperCase()}
                        </span>
                    </div>
                    <div class="text-right">
                        <span class="block text-xs uppercase text-gray-500">Size</span>
                        <span class="font-mono text-white">${parseFloat(pos.size).toFixed(2)} Shares</span>
                    </div>
                    <div class="text-right">
                        <span class="block text-xs uppercase text-gray-500">Avg Price</span>
                        <span class="font-mono text-white">$${parseFloat(pos.avgPrice).toFixed(2)}</span>
                    </div>
                </div>
            `).join('');
        }

        // Initial load
        fetchData();
    </script>
</body>
</html>
