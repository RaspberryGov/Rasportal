<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Quant Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .stat-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 8px; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-2">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col mb-4 gap-2 items-center text-center">
            <h1 class="text-xl font-black text-white italic tracking-tighter uppercase">Poly <span class="text-blue-500">Event Tracker</span></h1>
            <div class="flex items-center bg-[#161b22] border border-gray-800 rounded-lg p-1 w-full max-w-md shadow-2xl">
                <input type="text" id="wallet-input" class="bg-transparent text-xs font-mono px-3 py-1.5 w-full outline-none text-blue-400" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="updateUser()" class="bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded uppercase hover:bg-blue-500 transition-all">Track</button>
            </div>
            <div id="status-bar" class="text-[9px] font-mono text-gray-500 uppercase tracking-widest">Tracking Live Markets...</div>
        </header>

        <div id="analytics-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"></div>

        <hr class="border-gray-800/50 mb-6">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="flex flex-col h-[50vh]"><h2 class="bg-orange-600 text-[10px] font-black p-1.5 mb-2 rounded text-center">BITCOIN FEED</h2><div id="col-btc" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[50vh]"><h2 class="bg-blue-600 text-[10px] font-black p-1.5 mb-2 rounded text-center">ETHEREUM FEED</h2><div id="col-eth" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[50vh]"><h2 class="bg-purple-600 text-[10px] font-black p-1.5 mb-2 rounded text-center">SOLANA FEED</h2><div id="col-sol" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
        </div>
    </div>

    <script>
        let CURRENT_USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth', 'sol'];
        let liveData = {};

        function getLiveSlug(asset, tf) {
            const now = Math.floor(Date.now() / 1000);
            const interval = tf === '5m' ? 300 : 900;
            const ts = Math.floor(now / interval) * interval;
            return `${asset}-updown-${tf}-${ts}`;
        }

        function initStats() {
            ASSETS.forEach(a => {
                liveData[a] = {
                    "5m": { slug: getLiveSlug(a, '5m'), upC: 0, upV: 0, downC: 0, downV: 0 },
                    "15m": { slug: getLiveSlug(a, '15m'), upC: 0, upV: 0, downC: 0, downV: 0 }
                };
            });
        }

        function getTimer(mins) {
            const now = new Date();
            const ms = now.getTime();
            const interval = mins * 60 * 1000;
            const remain = interval - (ms % interval);
            const rM = Math.floor(remain / 60000);
            const rS = Math.floor((remain % 60000) / 1000);
            return `${String(rM).padStart(2,'0')}:${String(rS).padStart(2,'0')}`;
        }

        async function sync() {
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${CURRENT_USER}&limit=100`);
                const trades = await res.json();
                
                initStats();
                ASSETS.forEach(id => document.getElementById(`col-${id}`).innerHTML = '');

                trades.forEach(t => {
                    const slug = t.slug || "";
                    const asset = ASSETS.find(a => slug.startsWith(a));
                    const timeframe = slug.includes('5m') ? '5m' : '15m';

                    if (asset && liveData[asset][timeframe]) {
                        if (slug === liveData[asset][timeframe].slug) {
                            const isDown = (t.outcomeIndex == "1") || (t.outcome?.toLowerCase() === 'no');
                            const vol = parseFloat(t.usdcSize) || 0;

                            if (isDown) {
                                liveData[asset][timeframe].downC++;
                                liveData[asset][timeframe].downV += vol;
                            } else {
                                liveData[asset][timeframe].upC++;
                                liveData[asset][timeframe].upV += vol;
                            }
                        }
                        renderCard(asset, t);
                    }
                });
                renderAnalytics();
            } catch (e) { console.error(e); }
        }

        function renderAnalytics() {
            const container = document.getElementById('analytics-grid');
            container.innerHTML = '';
            ASSETS.forEach(a => {
                const color = a === 'btc' ? 'orange-500' : a === 'eth' ? 'blue-500' : 'purple-500';
                const div = document.createElement('div');
                div.className = "bg-[#161b22] border border-gray-800 rounded-lg overflow-hidden";
                div.innerHTML = `
                    <div class="bg-${color} text-black text-[10px] font-black py-1 px-3 uppercase">${a} Monitor</div>
                    <div class="p-3 space-y-4">
                        ${renderStatBox(a, "5m", 5)}
                        ${renderStatBox(a, "15m", 15)}
                    </div>`;
                container.appendChild(div);
            });
        }

        function renderStatBox(asset, tf, mins) {
            const d = liveData[asset][tf];
            return `
                <div>
                    <div class="flex justify-between items-center mb-2 border-b border-gray-800 pb-1">
                        <span class="text-[9px] text-gray-400 font-black uppercase">${tf} LIVE</span>
                        <span class="text-[10px] font-mono text-blue-400 uppercase">RESETS: ${getTimer(mins)}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="stat-box border-l-4 border-green-500">
                            <div class="text-[8px] text-gray-500 font-bold">UP</div>
                            <div class="text-[14px] font-black text-green-400">${d.upC} <span class="text-[9px] text-gray-600 block">$${Math.round(d.upV)}</span></div>
                        </div>
                        <div class="stat-box border-l-4 border-red-500">
                            <div class="text-[8px] text-gray-500 font-bold">DOWN</div>
                            <div class="text-[14px] font-black text-red-400">${d.downC} <span class="text-[9px] text-gray-600 block">$${Math.round(d.downV)}</span></div>
                        </div>
                    </div>
                </div>`;
        }

        function renderCard(asset, t) {
            const isDown = (t.outcomeIndex == "1") || (t.outcome?.toLowerCase() === 'no');
            const dir = isDown ? "DOWN" : "UP";
            const price = (parseFloat(t.usdcSize) / parseFloat(t.size)).toFixed(2);
            const isLive = t.slug === liveData[asset][t.slug.includes('5m')?'5m':'15m'].slug;
            
            const html = `
                <div class="bg-[#1a1f26] border ${isLive?'border-blue-500/40':'border-gray-800'} rounded p-2 mb-2">
                    <div class="flex justify-between text-[8px] mb-2 font-mono uppercase">
                        <span class="${isLive?'text-blue-400':'text-gray-600'}">${t.slug.includes('5m')?'5M':'15M'} ${isLive?'[LIVE]':''}</span>
                        <span class="text-gray-500">${new Date(t.timestamp*1000).toLocaleTimeString()}</span>
                    </div>
                    <div class="text-[10px] font-bold text-gray-200 mb-2 truncate">${t.title}</div>
                    <div class="grid grid-cols-3 gap-1 bg-black/40 rounded p-2 border border-white/5 text-center">
                        <div><div class="text-[7px] text-gray-500">SIDE</div><div class="text-[10px] font-black ${dir==='UP'?'text-green-500':'text-red-500'}">${dir}</div></div>
                        <div><div class="text-[7px] text-gray-500">PRC</div><div class="text-[10px] font-mono text-yellow-500">${price}¢</div></div>
                        <div><div class="text-[7px] text-gray-500">VOL</div><div class="text-[10px] font-mono text-blue-400">$${Math.round(t.usdcSize)}</div></div>
                    </div>
                </div>`;
            document.getElementById(`col-${asset}`).insertAdjacentHTML('beforeend', html);
        }

        function updateUser() {
            const val = document.getElementById('wallet-input').value.trim();
            if (val.length === 42) { CURRENT_USER = val; sync(); }
        }

        setInterval(sync, 10000); 
        setInterval(renderAnalytics, 1000); 
        sync();
    </script>
</body>
</html>
