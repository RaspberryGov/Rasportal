<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Crypto Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        
        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: rgba(59, 130, 246, 1); }
            100% { border-color: rgba(59, 130, 246, 0.5); }
        }
        .status-active { animation: pulse-border 2s infinite; }
        .donate-pulse { animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(234, 179, 8, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
        }
        .modal-bg { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); }

        /* MOBILE FIX: Force hidden unless active */
        @media (max-width: 1023px) {
            .mobile-col { display: none !important; }
            .mobile-col.active { display: flex !important; width: 100%; }
        }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-2 md:p-4">
    
    <div id="qr-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center modal-bg p-4" onclick="closeQR()">
        <div class="bg-[#161b22] border border-yellow-500/30 p-6 rounded-2xl max-w-xs w-full text-center shadow-2xl" onclick="event.stopPropagation()">
            <h3 class="text-yellow-500 font-black text-xs uppercase tracking-widest mb-4">Support the Developer</h3>
            <div class="bg-white p-3 rounded-xl mb-4 inline-block">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0xE54AA4F86317457D6E89250A55BA9982538dA4Eb" alt="QR Code" class="w-40 h-40">
            </div>
            <p class="text-[10px] text-gray-400 font-mono mb-4 break-all px-2 font-bold">0xE54AA4F86317457D6E89250A55BA9982538dA4Eb</p>
            <button onclick="closeQR()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-black text-[10px] py-2 rounded uppercase transition-colors">Close</button>
        </div>
    </div>

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col mb-4 gap-4 items-center">
            
            <div class="flex flex-wrap justify-center items-center gap-4 w-full">
                <h1 class="text-xl font-black text-white italic tracking-tighter">POLY <span class="text-blue-500">MONITOR</span></h1>
                <div id="status-bar" class="text-[9px] font-mono text-gray-400 bg-gray-900 px-3 py-1 rounded-full border border-gray-800 uppercase tracking-widest status-active">SYNCING...</div>
                <div onclick="openQR(); copyDonation();" class="donate-pulse flex items-center gap-2 bg-yellow-500/10 border border-yellow-500/30 px-3 py-1 rounded-full cursor-pointer">
                    <span class="text-[9px] font-black text-yellow-500 uppercase">Donate</span>
                    <span id="donation-addr" class="text-[9px] font-mono text-yellow-200/70">0xE54...A4Eb</span>
                </div>
                <a href="https://x.com/raspberrygov" target="_blank" class="flex items-center gap-2 bg-white/5 border border-white/10 px-3 py-1 rounded-full hover:bg-white/10">
                    <span class="text-[9px] font-black text-white uppercase">Follow</span>
                    <svg class="h-3 w-3 fill-current text-white" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                </a>
            </div>

            <div class="w-full max-w-4xl bg-black/40 border border-gray-800 rounded-lg p-2 overflow-hidden">
                <div class="text-[8px] font-black text-gray-500 uppercase tracking-[0.2em] mb-1 text-center">Global Recent (10)</div>
                <div id="recent-ticker" class="flex gap-2 overflow-x-auto pb-1 custom-scrollbar">
                    <div class="text-[10px] text-gray-700 w-full text-center py-1">Fetching live data...</div>
                </div>
            </div>

            <div id="favorites-list" class="flex flex-wrap justify-center gap-2 w-full"></div>

            <div class="flex items-center bg-[#161b22] border border-gray-800 rounded-xl p-1 shadow-2xl w-full max-w-lg">
                <button onclick="toggleFavorite()" id="fav-btn" class="px-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="star-icon"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.921-.755 1.688-1.54 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.784.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg></button>
                <input type="text" id="wallet-input" class="bg-transparent text-xs font-mono px-2 py-1.5 w-full outline-none text-blue-400" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="updateUser()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black px-4 py-1.5 rounded-lg uppercase">Switch</button>
            </div>

            <div class="lg:hidden flex w-full bg-gray-900 border border-gray-800 rounded-lg p-1">
                <button onclick="switchTab('btc')" id="tab-btc" class="flex-1 py-2 text-[10px] font-black rounded bg-orange-500 text-black">BTC</button>
                <button onclick="switchTab('eth')" id="tab-eth" class="flex-1 py-2 text-[10px] font-black rounded text-gray-500">ETH</button>
                <button onclick="switchTab('sol')" id="tab-sol" class="flex-1 py-2 text-[10px] font-black rounded text-gray-500">SOL</button>
                <button onclick="switchTab('xrp')" id="tab-xrp" class="flex-1 py-2 text-[10px] font-black rounded text-gray-500">XRP</button>
            </div>
        </header>

        <div id="swipe-area" class="grid grid-cols-1 lg:grid-cols-4 gap-4 touch-pan-y">
            <div id="wrapper-btc" class="mobile-col active lg:flex flex-col h-[65vh]">
                <h2 class="bg-orange-500/10 text-orange-500 text-[10px] font-black p-2 mb-2 rounded border border-orange-500/20 text-center uppercase">Bitcoin</h2>
                <div id="col-btc" class="space-y-2 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div id="wrapper-eth" class="mobile-col lg:flex flex-col h-[65vh]">
                <h2 class="bg-blue-500/10 text-blue-500 text-[10px] font-black p-2 mb-2 rounded border border-blue-500/20 text-center uppercase">Ethereum</h2>
                <div id="col-eth" class="space-y-2 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div id="wrapper-sol" class="mobile-col lg:flex flex-col h-[65vh]">
                <h2 class="bg-purple-500/10 text-purple-500 text-[10px] font-black p-2 mb-2 rounded border border-purple-500/20 text-center uppercase">Solana</h2>
                <div id="col-sol" class="space-y-2 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div id="wrapper-xrp" class="mobile-col lg:flex flex-col h-[65vh]">
                <h2 class="bg-teal-500/10 text-teal-500 text-[10px] font-black p-2 mb-2 rounded border border-teal-500/20 text-center uppercase">XRP</h2>
                <div id="col-xrp" class="space-y-2 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
        </div>
    </div>

    <script>
        let CURRENT_USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth', 'sol', 'xrp'];
        let activeTabIndex = 0;

        function init() {
            renderFavorites(); updateStarUI(); sync();
            setInterval(sync, 10000);
            setupSwipe();
        }

        function setupSwipe() {
            let startX = 0;
            document.getElementById('swipe-area').addEventListener('touchstart', e => startX = e.changedTouches[0].screenX);
            document.getElementById('swipe-area').addEventListener('touchend', e => {
                if (window.innerWidth >= 1024) return;
                let diff = startX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > 60) {
                    activeTabIndex = diff > 0 ? (activeTabIndex + 1) % 4 : (activeTabIndex - 1 + 4) % 4;
                    switchTab(ASSETS[activeTabIndex]);
                }
            });
        }

        function switchTab(asset) {
            activeTabIndex = ASSETS.indexOf(asset);
            ASSETS.forEach(id => {
                document.getElementById(`wrapper-${id}`).classList.remove('active');
                document.getElementById(`tab-${id}`).className = "flex-1 py-2 text-[10px] font-black rounded text-gray-500";
            });
            const colors = {btc: 'bg-orange-500', eth: 'bg-blue-500', sol: 'bg-purple-500', xrp: 'bg-teal-500'};
            document.getElementById(`wrapper-${asset}`).classList.add('active');
            document.getElementById(`tab-${asset}`).className = `flex-1 py-2 text-[10px] font-black rounded ${colors[asset]} text-black`;
        }

        async function sync() {
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${CURRENT_USER}&limit=50`);
                const data = await res.json();
                ASSETS.forEach(id => document.getElementById(`col-${id}`).innerHTML = '');
                const ticker = document.getElementById('recent-ticker');
                ticker.innerHTML = '';

                if (!data || data.length === 0) {
                    document.getElementById('status-bar').innerText = "NO ACTIVITY";
                    return;
                }

                // Global Top 10
                data.slice(0, 10).forEach(item => {
                    const isBuy = item.side === 'BUY';
                    ticker.insertAdjacentHTML('beforeend', `
                        <div class="flex-shrink-0 bg-gray-900 border border-gray-800 p-1.5 rounded min-w-[120px]">
                            <div class="text-[7px] font-bold ${isBuy?'text-green-500':'text-red-500'} uppercase">${item.side}</div>
                            <div class="text-[9px] font-bold text-white truncate w-24">${item.title}</div>
                            <div class="text-[8px] text-blue-400 font-mono">$${parseFloat(item.usdcSize).toFixed(0)}</div>
                        </div>
                    `);
                });

                // Column Feeds
                data.forEach(item => {
                    const t = item.title.toLowerCase();
                    let col = t.includes('btc')||t.includes('bitcoin') ? 'btc' : t.includes('eth')||t.includes('ethereum') ? 'eth' : t.includes('sol') ? 'sol' : t.includes('xrp') ? 'xrp' : null;
                    if (col) document.getElementById(`col-${col}`).insertAdjacentHTML('beforeend', createCard(item));
                });
                document.getElementById('status-bar').innerText = `UPDATED: ${new Date().toLocaleTimeString()}`;
            } catch (e) { document.getElementById('status-bar').innerText = "OFFLINE"; }
        }

        function createCard(item) {
            const isBuy = item.side === 'BUY';
            return `<div class="bg-[#161b22] border border-gray-800 rounded-lg p-2.5">
                <div class="flex justify-between text-[8px] font-black mb-1">
                    <span class="${isBuy?'text-green-500':'text-red-500'}">${item.side} ${item.type}</span>
                    <span class="text-gray-500 font-mono">${new Date(item.timestamp*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
                </div>
                <div class="text-[10px] font-bold text-gray-200 mb-2 leading-tight">${item.title}</div>
                <div class="flex justify-between items-center bg-black/40 p-1.5 rounded">
                    <span class="text-[10px] font-black text-blue-400">$${parseFloat(item.usdcSize).toLocaleString()}</span>
                    <a href="https://polymarket.com/event/${item.slug}" target="_blank" class="text-gray-600 hover:text-white">→</a>
                </div>
            </div>`;
        }

        function updateUser(address = null) {
            const addr = (address || document.getElementById('wallet-input').value).trim().toLowerCase();
            if (addr.startsWith('0x') && addr.length === 42) {
                CURRENT_USER = addr; document.getElementById('wallet-input').value = addr;
                renderFavorites(); updateStarUI(); sync();
            }
        }

        function toggleFavorite() {
            let favs = JSON.parse(localStorage.getItem('poly_favorites') || '[]');
            if (favs.includes(CURRENT_USER)) favs = favs.filter(a => a !== CURRENT_USER);
            else favs.push(CURRENT_USER);
            localStorage.setItem('poly_favorites', JSON.stringify(favs));
            renderFavorites(); updateStarUI();
        }

        function renderFavorites() {
            const list = document.getElementById('favorites-list');
            list.innerHTML = '';
            JSON.parse(localStorage.getItem('poly_favorites') || '[]').forEach(addr => {
                const isActive = addr === CURRENT_USER;
                const div = document.createElement('div');
                div.className = `flex items-center bg-gray-900 border ${isActive?'border-blue-500':'border-gray-800'} rounded overflow-hidden`;
                div.innerHTML = `<button onclick="updateUser('${addr}')" class="px-2 py-1 text-[9px] font-mono ${isActive?'text-white':'text-gray-500'}">${addr.slice(0,4)}...${addr.slice(-4)}</button>`;
                list.appendChild(div);
            });
        }

        function updateStarUI() {
            const isFav = JSON.parse(localStorage.getItem('poly_favorites') || '[]').includes(CURRENT_USER);
            document.getElementById('star-icon').setAttribute('fill', isFav ? '#fbbf24' : 'none');
            document.getElementById('star-icon').setAttribute('stroke', isFav ? '#fbbf24' : 'currentColor');
        }

        function openQR() { document.getElementById('qr-modal').classList.remove('hidden'); }
        function closeQR() { document.getElementById('qr-modal').classList.add('hidden'); }
        function copyDonation() { navigator.clipboard.writeText("0xE54AA4F86317457D6E89250A55BA9982538dA4Eb"); }
        init();
    </script>
</body>
</html>
