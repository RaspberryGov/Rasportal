<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Activity Mirror: @rename</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0e1117] text-white font-sans p-4">
    <div class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
            <h1 class="text-xl font-bold">@rename Activity Mirror</h1>
            <div class="flex items-center gap-2">
                <span id="load-indicator" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-xs text-gray-400 font-mono" id="last-update">Updating...</span>
            </div>
        </header>

        <div id="activity-feed" class="space-y-3">
            <div class="animate-pulse flex flex-col gap-3">
                <div class="h-20 bg-gray-800 rounded-xl"></div>
                <div class="h-20 bg-gray-800 rounded-xl"></div>
            </div>
        </div>
        
        <button onclick="sync()" class="mt-8 w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-sm transition">
            Manual Sync
        </button>
    </div>

    <script>
        // The core profile address provided
        const USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";

        async function sync() {
            const feed = document.getElementById('activity-feed');
            const indicator = document.getElementById('load-indicator');
            indicator.classList.add('bg-blue-500');

            try {
                // This is the specific endpoint that mirrors the "Activity" tab on the site
                const response = await fetch(`https://data-api.polymarket.com/activity?user=${USER}&limit=20`);
                const data = await response.json();

                if (!data || data.length === 0) {
                    feed.innerHTML = `<div class="text-center py-10 text-gray-500 italic">No activity found for this address.</div>`;
                    return;
                }

                feed.innerHTML = data.map(item => {
                    const isBuy = item.side === 'BUY';
                    const time = new Date(item.timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    // Filter for BTC markets as requested, or show all if you prefer
                    const isBTC = item.title.toLowerCase().includes('btc');
                    const highlightClass = isBTC ? 'border-blue-500/50 bg-blue-500/5' : 'border-gray-800';

                    return `
                        <div class="border ${highlightClass} p-4 rounded-xl flex justify-between items-center group hover:bg-gray-800/40 transition">
                            <div class="flex flex-col gap-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-bold uppercase tracking-wider ${isBuy ? 'text-green-500' : 'text-red-500'}">
                                        ${item.side} ${item.type}
                                    </span>
                                    <span class="text-[10px] text-gray-500 font-mono">${time}</span>
                                </div>
                                <div class="text-sm font-medium text-gray-200 truncate pr-4">
                                    ${item.title}
                                </div>
                            </div>
                            <div class="text-right shrink-0">
                                <div class="text-sm font-bold text-white">$${parseFloat(item.cash).toFixed(2)}</div>
                                <div class="text-[10px] text-gray-500 font-mono">@ $${parseFloat(item.price).toFixed(3)}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById('last-update').innerText = `Last Sync: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                console.error("Sync Error:", err);
                feed.innerHTML = `<div class="text-red-400 text-xs p-4 bg-red-900/20 rounded">Error: Could not reach Polymarket API. Check your connection.</div>`;
            } finally {
                indicator.classList.remove('bg-blue-500');
            }
        }

        // Automatic Refresh every 15 seconds to catch 5-minute market moves
        sync();
        setInterval(sync, 15000);
    </script>
</body>
</html>
