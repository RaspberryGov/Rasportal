<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Crypto Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        
        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: rgba(59, 130, 246, 1); }
            100% { border-color: rgba(59, 130, 246, 0.5); }
        }
        .status-active { animation: pulse-border 2s infinite; }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(234, 179, 8, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
        }
        .donate-pulse { animation: pulse-gold 2s infinite; }
        .modal-bg { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); }

        /* Mobile Tab & Swipe Logic */
        @media (max-width: 1023px) {
            .column-hidden { display: none; }
            .column-active { display: flex !important; }
        }
        
        /* Smooth transitions for content */
        .feed-container { transition: opacity 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-4">
    
    <div id="qr-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center modal-bg p-4" onclick="closeQR()">
        <div class="bg-[#161b22] border border-yellow-500/30 p-6 rounded-2xl max-w-xs w-full text-center shadow-2xl" onclick="event.stopPropagation()">
            <h3 class="text-yellow-500 font-black text-xs uppercase tracking-widest mb-4">Support the Developer</h3>
            <div class="bg-white p-3 rounded-xl mb-4 inline-block">
                <img id="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0xE54AA4F86317457D6E89250A55BA9982538dA4Eb" alt="QR Code" class="w-40 h-40">
            </div>
            <p class="text-[10px] text-gray-400 font-mono mb-4 break-all px-2 font-bold">0xE54AA4F86317457D6E89250A55BA9982538dA4Eb</p>
            <button onclick="closeQR()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-black text-[10px] py-2 rounded uppercase transition-colors">Close</button>
        </div>
    </div>

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col mb-6 gap-6 items-center">
            
            <div class="flex flex-wrap justify-center items-center gap-4 w-full">
                <h1 class="text-2xl font-black text-white italic tracking-tighter">POLY <span class="text-blue-500">MONITOR</span></h1>
                
                <div id="status-bar" class="text-[10px] font-mono text-gray-400 bg-gray-900 px-4 py-1.5 rounded-full border border-gray-800 uppercase tracking-widest status-active">
                    SYNCING...
                </div>

                <div onclick="openQR(); copyDonation();" class="donate-pulse flex items-center gap-2 bg-yellow-500/10 border border-yellow-500/30 px-4 py-1.5 rounded-full cursor-pointer hover:bg-yellow-500/20 transition-all group">
                    <span class="text-[10px] font-black text-yellow-500 uppercase tracking-tighter">Donate</span>
                    <span id="donation-addr" class="text-[10px] font-mono text-yellow-200/70">0xE54...A4Eb</span>
                </div>

                <a href="https://x.com/raspberrygov" target="_blank" class="flex items-center gap-2 bg-white/5 border border-white/10 px-4 py-1.5 rounded-full hover:bg-white/10 transition-all group">
                    <span class="text-[10px] font-black text-white uppercase tracking-tighter">Follow</span>
                    <svg class="h-3 w-3 fill-current text-white" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                </a>
            </div>

            <div class="flex items-center bg-[#161b22] border border-gray-800 rounded-xl p-1 shadow-2xl w-full max-w-xl">
                <button onclick="toggleFavorite()" id="fav-btn" class="px-3 text-gray-500 hover:text-yellow-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="star-icon"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.921-.755 1.688-1.54 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.784.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
                </button>
                <input type="text" id="wallet-input" placeholder="Enter Wallet Address (0x...)" class="bg-transparent text-sm font-mono px-3 py-2 w-full outline-none text-blue-400 placeholder:text-gray-600" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="clearInput()" class="px-3 text-gray-600 hover:text-red-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                <button onclick="updateUser()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-black px-6 py-2 rounded-lg uppercase transition-all ml-1">Switch</button>
            </div>

            <div class="lg:hidden flex justify-between w-full bg-gray-900/50 p-1 rounded-lg border border-gray-800">
                <button onclick="switchTab('btc')" id="tab-btc" class="flex-1 py-2 text-[10px] font-black uppercase tracking-wider rounded tab-btn bg-orange-500 text-black">BTC</button>
                <button onclick="switchTab('eth')" id="tab-eth" class="flex-1 py-2 text-[10px] font-black uppercase tracking-wider rounded tab-btn text-gray-500">ETH</button>
                <button onclick="switchTab('sol')" id="tab-sol" class="flex-1 py-2 text-[10px] font-black uppercase tracking-wider rounded tab-btn text-gray-500">SOL</button>
                <button onclick="switchTab('xrp')" id="tab-xrp" class="flex-1 py-2 text-[10px] font-black uppercase tracking-wider rounded tab-btn text-gray-500">XRP</button>
            </div>
        </header>

        <div id="swipe-area" class="grid grid-cols-1 lg:grid-cols-4 gap-4 touch-pan-y">
            <div id="wrapper-btc" class="flex flex-col h-[70vh] column-active feed-container">
                <h2 class="bg-orange-500/10 text-orange-500 text-[10px] font-black p-2 mb-2 rounded border border-orange-500/20 text-center uppercase tracking-widest">Bitcoin</h2>
                <div id="col-btc" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div id="wrapper-eth" class="flex flex-col h-[70vh] column-hidden lg:flex feed-container">
                <h2 class="bg-blue-500/10 text-blue-500 text-[10px] font-black p-2 mb-2 rounded border border-blue-500/20 text-center uppercase tracking-widest">Ethereum</h2>
                <div id="col-eth" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div id="wrapper-sol" class="flex flex-col h-[70vh] column-hidden lg:flex feed-container">
                <h2 class="bg-purple-500/10 text-purple-500 text-[10px] font-black p-2 mb-2 rounded border border-purple-500/20 text-center uppercase tracking-widest">Solana</h2>
                <div id="col-sol" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div id="wrapper-xrp" class="flex flex-col h-[70vh] column-hidden lg:flex feed-container">
                <h2 class="bg-teal-500/10 text-teal-500 text-[10px] font-black p-2 mb-2 rounded border border-teal-500/20 text-center uppercase tracking-widest">XRP</h2>
                <div id="col-xrp" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
        </div>
    </div>

    <script>
        let CURRENT_USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth', 'sol', 'xrp'];
        let activeTabIndex = 0;
        let touchstartX = 0;
        let touchendX = 0;

        function init() {
            renderFavorites(); updateStarUI(); sync();
            setInterval(sync, 10000);
            setupSwipe();
        }

        // Swipe Detection
        function setupSwipe() {
            const swipeArea = document.getElementById('swipe-area');
            swipeArea.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, false);
            swipeArea.addEventListener('touchend', e => { 
                touchendX = e.changedTouches[0].screenX;
                handleSwipe();
            }, false);
        }

        function handleSwipe() {
            if (window.innerWidth >= 1024) return; // Disable on desktop
            const threshold = 50;
            if (touchendX < touchstartX - threshold) {
                // Swiped Left -> Next Tab
                activeTabIndex = (activeTabIndex + 1) % ASSETS.length;
                switchTab(ASSETS[activeTabIndex]);
            }
            if (touchendX > touchstartX + threshold) {
                // Swiped Right -> Prev Tab
                activeTabIndex = (activeTabIndex - 1 + ASSETS.length) % ASSETS.length;
                switchTab(ASSETS[activeTabIndex]);
            }
        }

        function switchTab(asset) {
            activeTabIndex = ASSETS.indexOf(asset);
            ASSETS.forEach(id => {
                document.getElementById(`wrapper-${id}`).classList.add('column-hidden');
                document.getElementById(`wrapper-${id}`).classList.remove('column-active');
                document.getElementById(`tab-${id}`).classList.remove('bg-orange-500', 'bg-blue-500', 'bg-purple-500', 'bg-teal-500', 'text-black');
                document.getElementById(`tab-${id}`).classList.add('text-gray-500');
            });
            const colors = {btc: 'bg-orange-500', eth: 'bg-blue-500', sol: 'bg-purple-500', xrp: 'bg-teal-500'};
            document.getElementById(`wrapper-${asset}`).classList.remove('column-hidden');
            document.getElementById(`wrapper-${asset}`).classList.add('column-active');
            document.getElementById(`tab-${asset}`).classList.remove('text-gray-500');
            document.getElementById(`tab-${asset}`).classList.add(colors[asset], 'text-black');
        }

        function openQR() { document.getElementById('qr-modal').classList.remove('hidden'); }
        function closeQR() { document.getElementById('qr-modal').classList.add('hidden'); }

        function copyDonation() {
            const addr = "0xE54AA4F86317457D6E89250A55BA9982538dA4Eb";
            navigator.clipboard.writeText(addr);
            const el = document.getElementById('donation-addr');
            const originalText = el.innerText;
            el.innerText = "COPIED!"; el.classList.add('text-white');
            setTimeout(() => { el.innerText = originalText; el.classList.remove('text-white'); }, 2000);
        }

        function clearInput() { document.getElementById('wallet-input').value = ''; }

        function updateUser(address = null) {
            const newAddress = address || document.getElementById('wallet-input').value.trim();
            if (newAddress.length === 42 && newAddress.startsWith('0x')) {
                CURRENT_USER = newAddress; document.getElementById('wallet-input').value = newAddress;
                ASSETS.forEach(id => { document.getElementById(`col-${id}`).innerHTML = `<div class="animate-pulse mt-10 text-center text-[10px] text-gray-600">SYNCING...</div>`; });
                sync();
            }
        }

        function toggleFavorite() {
            const addr = CURRENT_USER.toLowerCase();
            const index = favorites.indexOf(addr);
            if (index > -1) favorites.splice(index, 1); else favorites.push(addr);
            localStorage.setItem('poly_favorites', JSON.stringify(favorites));
            renderFavorites(); updateStarUI();
        }

        function removeFavorite(addr, e) {
            e.stopPropagation();
            favorites = favorites.filter(a => a !== addr);
            localStorage.setItem('poly_favorites', JSON.stringify(favorites));
            renderFavorites(); updateStarUI();
        }

        function updateStarUI() {
            const star = document.getElementById('star-icon');
            if (JSON.parse(localStorage.getItem('poly_favorites') || '[]').includes(CURRENT_USER.toLowerCase())) {
                star.setAttribute('fill', '#fbbf24'); star.setAttribute('stroke', '#fbbf24');
            } else {
                star.setAttribute('fill', 'none'); star.setAttribute('stroke', 'currentColor');
            }
        }

        function renderFavorites() {
            const list = document.getElementById('favorites-list');
            list.innerHTML = '';
            favorites = JSON.parse(localStorage.getItem('poly_favorites') || '[]');
            favorites.forEach(addr => {
                const short = addr.slice(0, 4) + '...' + addr.slice(-4);
                const chip = document.createElement('div');
                chip.className = `flex items-center bg-gray-900 border ${addr === CURRENT_USER.toLowerCase() ? 'border-blue-500' : 'border-gray-800'} rounded overflow-hidden shadow-lg`;
                chip.innerHTML = `
                    <button onclick="updateUser('${addr}')" class="px-2 py-1 text-[10px] font-mono text-gray-400 hover:text-white">${short}</button>
                    <button onclick="removeFavorite('${addr}', event)" class="px-1.5 py-1 bg-gray-800/50 hover:bg-red-900/30 text-gray-600 hover:text-red-400 border-l border-gray-800 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>`;
                list.appendChild(chip);
            });
        }

        async function sync() {
            try {
                const response = await fetch(`https://data-api.polymarket.com/activity?user=${CURRENT_USER}&limit=40`);
                const data = await response.json();
                ASSETS.forEach(id => document.getElementById(`col-${id}`).innerHTML = '');
                if (!data || data.length === 0) { document.getElementById('status-bar').innerText = "NO RECENT ACTIVITY"; return; }
                data.forEach(item => {
                    const title = item.title.toLowerCase();
                    let targetCol = null;
                    if (title.includes('btc') || title.includes('bitcoin')) targetCol = 'btc';
                    else if (title.includes('eth') || title.includes('ethereum')) targetCol = 'eth';
                    else if (title.includes('solana') || title.includes('sol')) targetCol = 'sol';
                    else if (title.includes('xrp')) targetCol = 'xrp';
                    if (targetCol) document.getElementById(`col-${targetCol}`).insertAdjacentHTML('beforeend', createCard(item));
                });
                document.getElementById('status-bar').innerText = `UPDATED: ${new Date().toLocaleTimeString()}`;
            } catch (err) { document.getElementById('status-bar').innerText = "OFFLINE - RETRYING..."; }
        }

        function createCard(item) {
            let direction = "UNKNOWN";
            const outcome = item.outcome?.toLowerCase();
            if (item.outcomeIndex === "0" || outcome === "yes") direction = "UP";
            else if (item.outcomeIndex === "1" || outcome === "no") direction = "DOWN";
            else if (item.outcome) direction = item.outcome.toUpperCase();
            const isBuy = item.side === 'BUY';
            const value = item.usdcSize ? parseFloat(item.usdcSize).toLocaleString(undefined, {minimumFractionDigits: 2}) : "0.00";
            const price = item.price ? parseFloat(item.price).toFixed(3) : "0.000";
            
            return `
                <div class="bg-[#161b22] border border-gray-800 rounded-lg p-3 hover:border-gray-500 transition-all group shadow-inner">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[9px] font-bold ${isBuy ? 'text-green-500' : 'text-red-400'} uppercase tracking-widest">${item.side} ${item.type}</span>
                        <span class="text-[12px] text-white font-black font-mono">${new Date(item.timestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div class="flex items-center justify-between gap-2 mb-3 overflow-hidden">
                        <span class="text-[12px] font-bold text-gray-200 leading-tight truncate whitespace-nowrap" title="${item.title}">${item.title}</span>
                        <a href="https://polymarket.com/event/${item.slug}" target="_blank" class="text-gray-600 hover:text-blue-400 shrink-0"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg></a>
                    </div>
                    <div class="flex justify-between items-end bg-black/40 p-2 rounded border border-gray-800/50">
                        <div><div class="text-[8px] text-gray-500 uppercase font-bold tracking-widest">Position</div><div class="text-sm font-black ${direction === 'UP' ? 'text-green-400' : 'text-red-400'}">${direction}</div></div>
                        <div class="text-right"><div class="text-[8px] text-gray-500 uppercase font-bold tracking-widest">Value</div><div class="text-xs font-mono font-bold text-white">$${value}</div><div class="text-[9px] text-gray-600 font-mono">$${price}</div></div>
                    </div>
                </div>`;
        }

        init();
    </script>
</body>
</html>
