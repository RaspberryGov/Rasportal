<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Pro Quant Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .stat-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; padding: 6px; }
        @keyframes pulse-red { 0% { color: #ef4444; } 50% { color: #7f1d1d; } 100% { color: #ef4444; } }
        .timer-warning { animation: pulse-red 1s infinite; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-2">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col mb-4 gap-2 items-center text-center">
            <h1 class="text-xl font-black text-white italic tracking-tighter">POLY <span class="text-blue-500">QUANT PRO</span></h1>
            <div class="flex items-center bg-[#161b22] border border-gray-800 rounded-lg p-1 w-full max-w-md shadow-2xl">
                <input type="text" id="wallet-input" class="bg-transparent text-xs font-mono px-3 py-1.5 w-full outline-none text-blue-400" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="updateUser()" class="bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded uppercase hover:bg-blue-500 transition-all">Track Wallet</button>
            </div>
            <div id="status-bar" class="text-[9px] font-mono text-gray-500 uppercase tracking-widest">System Live</div>
        </header>

        <div id="analytics-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-6"></div>

        <hr class="border-gray-800/50 mb-6">

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="flex flex-col h-[55vh]"><h2 class="bg-orange-600 text-white text-[10px] font-black p-1.5 mb-2 rounded text-center">BTC</h2><div id="col-btc" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[55vh]"><h2 class="bg-blue-600 text-white text-[10px] font-black p-1.5 mb-2 rounded text-center">ETH</h2><div id="col-eth" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[55vh]"><h2 class="bg-purple-600 text-white text-[10px] font-black p-1.5 mb-2 rounded text-center">SOL</h2><div id="col-sol" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[55vh]"><h2 class="bg-teal-600 text-white text-[10px] font-black p-1.5 mb-2 rounded text-center">XRP</h2><div id="col-xrp" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
        </div>
    </div>

    <script>
        let CURRENT_USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth', 'sol', 'xrp'];
        let stats = {};

        function initStats() {
            ASSETS.forEach(a => {
                stats[a] = {
                    "5 MIN": { upCount: 0, upVol: 0, downCount: 0, downVol: 0, currentMarketTitle: "" },
                    "15 MIN": { upCount: 0, upVol: 0, downCount: 0, downVol: 0, currentMarketTitle: "" }
                };
            });
        }

        function getMarketEndTimer(interval) {
            const now = new Date();
            const ms = now.getTime();
            const intervalMs = interval * 60 * 1000;
            const remaining = intervalMs - (ms % intervalMs);
            const rMin = Math.floor(remaining / 60000);
            const rSec = Math.floor((remaining % 60000) / 1000);
            return `${String(rMin).padStart(2, '0')}:${String(rSec).padStart(2, '0')}`;
        }

        async function sync() {
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${CURRENT_USER}&limit=100`);
                const data = await res.json();
                
                initStats(); // Refresh stats on every sync
                ASSETS.forEach(id => document.getElementById(`col-${id}`).innerHTML = '');

                // 1. Identify "Current" Live Market Titles from the feed first
                data.forEach(item => {
                    const title = item.title.toLowerCase();
                    if (!title.includes('up or down')) return;
                    
                    let aKey = ASSETS.find(a => title.includes(a) || (a==='btc' && title.includes('bitcoin')) || (a==='eth' && title.includes('ethereum')));
                    if (!aKey) return;

                    const label = title.includes('5 min') ? "5 MIN" : "15 MIN";
                    // If we haven't picked a "live" title for this slot, pick the first (newest) one we see
                    if (!stats[aKey][label].currentMarketTitle) {
                        stats[aKey][label].currentMarketTitle = item.title;
                    }
                });

                // 2. Aggregate only for those specific "Live" titles
                data.forEach(item => {
                    const title = item.title;
                    const titleL = title.toLowerCase();
                    if (!titleL.includes('up or down')) return;

                    let aKey = ASSETS.find(a => titleL.includes(a) || (a==='btc' && titleL.includes('bitcoin')) || (a==='eth' && titleL.includes('ethereum')));
                    if (!aKey) return;

                    const label = titleL.includes('5 min') ? "5 MIN" : "15 MIN";

                    // Robust Direction Detection
                    const isDown = (item.outcomeIndex == "1") || 
                                   (item.outcome?.toLowerCase() === 'no') || 
                                   (item.outcome?.toLowerCase() === 'down');
                    
                    const direction = isDown ? "DOWN" : "UP";
                    const vol = parseFloat(item.usdcSize) || 0;

                    // Update Feed Column
                    renderCard(aKey, item, label, direction);

                    // Update Global Stats ONLY if it matches the identified current market
                    if (title === stats[aKey][label].currentMarketTitle) {
                        if (direction === "UP") {
                            stats[aKey][label].upCount++;
                            stats[aKey][label].upVol += vol;
                        } else {
                            stats[aKey][label].downCount++;
                            stats[aKey][label].downVol += vol;
                        }
                    }
                });

                renderAnalytics();
                document.getElementById('status-bar').innerText = `UPDATED: ${new Date().toLocaleTimeString()}`;
            } catch (e) { console.error("Sync Error:", e); }
        }

        function renderAnalytics() {
            const container = document.getElementById('analytics-grid');
            container.innerHTML = '';
            ASSETS.forEach(a => {
                const color = a === 'btc' ? 'orange-500' : a === 'eth' ? 'blue-500' : a === 'sol' ? 'purple-500' : 'teal-500';
                const div = document.createElement('div');
                div.className = "bg-[#161b22] border border-gray-800 rounded-lg overflow-hidden";
                div.innerHTML = `
                    <div class="bg-${color} text-black text-[10px] font-black py-1 px-3 uppercase tracking-widest">${a} Current Market</div>
                    <div class="p-2 space-y-4">
                        ${renderStatRow(a, "5 MIN", 5)}
                        ${renderStatRow(a, "15 MIN", 15)}
                    </div>`;
                container.appendChild(div);
            });
        }

        function renderStatRow(asset, label, interval) {
            const d = stats[asset][label];
            const timer = getMarketEndTimer(interval);
            const isClosing = parseInt(timer.split(':')[0]) === 0 && parseInt(timer.split(':')[1]) < 30;
            
            return `
                <div>
                    <div class="flex justify-between items-center mb-1 border-b border-gray-800 pb-1">
                        <span class="text-[8px] text-gray-500 font-bold">${label}UTE</span>
                        <span class="text-[9px] font-mono ${isClosing?'timer-warning':'text-blue-400'}">RESET: ${timer}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="stat-box border-l-2 border-green-500">
                            <div class="text-[7px] text-gray-500 uppercase font-black">BUY UP</div>
                            <div class="text-[11px] font-black text-green-400">${d.upCount} <span class="text-[8px] text-gray-600 ml-1 font-normal">$${Math.round(d.upVol)}</span></div>
                        </div>
                        <div class="stat-box border-l-2 border-red-500">
                            <div class="text-[7px] text-gray-500 uppercase font-black">BUY DOWN</div>
                            <div class="text-[11px] font-black text-red-400">${d.downCount} <span class="text-[8px] text-gray-600 ml-1 font-normal">$${Math.round(d.downVol)}</span></div>
                        </div>
                    </div>
                </div>`;
        }

        function renderCard(col, item, label, direction) {
            const side = item.side?.toUpperCase() || "TRADE";
            const price = (parseFloat(item.usdcSize) / parseFloat(item.size)).toFixed(2);
            const html = `
                <div class="bg-[#161b22] border border-gray-800 rounded p-2 shadow-sm">
                    <div class="flex justify-between text-[8px] mb-1">
                        <span class="text-blue-500 font-bold">${label}</span>
                        <span class="text-gray-500">${new Date(item.timestamp*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
                    </div>
                    <div class="text-[10px] text-gray-200 font-medium truncate mb-2">${item.title}</div>
                    <div class="grid grid-cols-3 bg-black/40 rounded p-1 border border-gray-800/50 text-center">
                        <div><div class="text-[6px] text-gray-500 uppercase">Pos</div><div class="text-[9px] font-bold ${direction==='UP'?'text-green-500':'text-red-500'}">${direction}</div></div>
                        <div><div class="text-[6px] text-gray-500 uppercase">Price</div><div class="text-[9px] font-mono text-yellow-500">${price}¢</div></div>
                        <div><div class="text-[6px] text-gray-500 uppercase">Size</div><div class="text-[9px] font-mono text-blue-400">$${Math.round(item.usdcSize)}</div></div>
                    </div>
                </div>`;
            document.getElementById(`col-${col}`).insertAdjacentHTML('beforeend', html);
        }

        function updateUser() {
            const val = document.getElementById('wallet-input').value.trim();
            if (val.length === 42) { CURRENT_USER = val; sync(); }
        }

        initStats();
        setInterval(sync, 10000); 
        setInterval(renderAnalytics, 1000); 
        sync();
    </script>
</body>
</html>
