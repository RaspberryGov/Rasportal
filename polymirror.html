<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Live: @rename</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0b0d] text-slate-200 min-h-screen p-4 md:p-10 font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tight">@RENAME <span class="text-blue-500 underline decoration-2 underline-offset-4">LIVE</span></h1>
                <p id="proxy-status" class="text-[10px] font-mono text-slate-500 mt-1 uppercase tracking-widest">Identifying Proxy Wallet...</p>
            </div>
            <div class="flex gap-3">
                <button onclick="fetchEverything()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-5 py-2 rounded-full transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                    REFRESH
                </button>
            </div>
        </header>

        <div class="grid lg:grid-cols-2 gap-8">
            
            <div class="space-y-4">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span> Active Positions
                </h2>
                <div id="active-container" class="space-y-3">
                    <div class="p-8 border border-slate-800 rounded-2xl text-center text-slate-600 italic text-sm">Initializing scan...</div>
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Activity History</h2>
                <div id="activity-container" class="bg-slate-900/40 border border-slate-800 rounded-2xl divide-y divide-slate-800 overflow-hidden">
                    <div class="p-8 text-center text-slate-600 italic text-sm">Loading history...</div>
                </div>
            </div>

        </div>

        <details class="mt-20 opacity-30 hover:opacity-100 transition">
            <summary class="text-[10px] cursor-pointer uppercase font-bold text-slate-600">Technical Debug Log</summary>
            <pre id="debug-log" class="text-[10px] bg-black p-4 mt-2 rounded border border-slate-800 overflow-x-auto"></pre>
        </details>
    </div>

    <script>
        const ADDRESS = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        let resolvedProxy = "";

        async function fetchEverything() {
            const debug = document.getElementById('debug-log');
            try {
                // 1. Resolve Proxy Wallet via Gamma API
                if (!resolvedProxy) {
                    const profileRes = await fetch(`https://gamma-api.polymarket.com/public-profile?wallet=${ADDRESS}`);
                    const profile = await profileRes.json();
                    resolvedProxy = profile.proxyWallet || ADDRESS;
                    document.getElementById('proxy-status').innerText = `PROXY: ${resolvedProxy}`;
                }

                // 2. Fetch Active Positions (Size Threshold set to 0 to show everything)
                const posRes = await fetch(`https://data-api.polymarket.com/positions?user=${resolvedProxy}&sizeThreshold=0`);
                const positions = await posRes.json();
                
                // 3. Fetch Activity
                const actRes = await fetch(`https://data-api.polymarket.com/activity?user=${resolvedProxy}&limit=10`);
                const activity = await actRes.json();

                debug.innerText = JSON.stringify({ positions, activity }, null, 2);
                renderActive(positions);
                renderActivity(activity);

            } catch (err) {
                console.error(err);
                document.getElementById('proxy-status').innerText = "API CONNECTION ERROR";
            }
        }

        function renderActive(positions) {
            const container = document.getElementById('active-container');
            // Filter specifically for BTC markets as requested
            const btc = positions.filter(p => p.title.toLowerCase().includes("btc"));

            if (btc.length === 0) {
                container.innerHTML = `<div class="p-10 border border-dashed border-slate-800 rounded-2xl text-center text-slate-600 text-sm">No active BTC positions at this moment.</div>`;
                return;
            }

            container.innerHTML = btc.map(p => `
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl hover:border-blue-500/50 transition-colors shadow-xl">
                    <div class="text-[10px] text-blue-400 font-bold uppercase mb-2">${p.title}</div>
                    <div class="flex justify-between items-end">
                        <div>
                            <div class="text-2xl font-black ${p.outcome.toLowerCase() === 'up' ? 'text-green-400' : 'text-red-400'}">${p.outcome.toUpperCase()}</div>
                            <div class="text-[10px] text-slate-500 font-mono mt-1">Shares: ${parseFloat(p.size).toFixed(2)}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-white font-bold">$${parseFloat(p.avgPrice).toFixed(3)}</div>
                            <div class="text-[10px] text-slate-500 uppercase">Avg Entry</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderActivity(activity) {
            const container = document.getElementById('activity-container');
            if (activity.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-slate-600 italic">No recent activity.</div>`;
                return;
            }

            container.innerHTML = activity.map(a => {
                const isBuy = a.side === 'BUY';
                return `
                    <div class="p-4 flex justify-between items-center hover:bg-slate-800/30 transition">
                        <div class="min-w-0 pr-4">
                            <div class="text-[11px] font-bold text-slate-200 truncate">${a.title || 'Market Trade'}</div>
                            <div class="text-[9px] text-slate-500 uppercase mt-0.5">${new Date(a.timestamp * 1000).toLocaleTimeString()}</div>
                        </div>
                        <div class="text-right shrink-0">
                            <div class="${isBuy ? 'text-green-500' : 'text-orange-500'} font-black text-xs">${a.side} ${a.type}</div>
                            <div class="text-[10px] text-white font-mono">$${parseFloat(a.cash).toFixed(2)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Auto-refresh every 20 seconds
        fetchEverything();
        setInterval(fetchEverything, 20000);
    </script>
</body>
</html>
