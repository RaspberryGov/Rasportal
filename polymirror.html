<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Crypto Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        
        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: rgba(59, 130, 246, 1); }
            100% { border-color: rgba(59, 130, 246, 0.5); }
        }
        .status-active { animation: pulse-border 2s infinite; }
        .donate-pulse { animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(234, 179, 8, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
        }
        .modal-bg { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); }

        @media (max-width: 1023px) {
            .mobile-col { display: none !important; }
            .mobile-col.active { display: flex !important; width: 100%; }
        }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-2 md:p-4">
    
    <div id="qr-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center modal-bg p-4" onclick="closeQR()">
        <div class="bg-[#161b22] border border-yellow-500/30 p-6 rounded-2xl max-w-xs w-full text-center shadow-2xl" onclick="event.stopPropagation()">
            <h3 class="text-yellow-500 font-black text-xs uppercase tracking-widest mb-4">Support the Developer</h3>
            <div class="bg-white p-3 rounded-xl mb-4 inline-block">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0xE54AA4F86317457D6E89250A55BA9982538dA4Eb" alt="QR Code" class="w-40 h-40">
            </div>
            <p class="text-[10px] text-gray-400 font-mono mb-4 break-all px-2 font-bold text-center">0xE54AA4F86317457D6E89250A55BA9982538dA4Eb</p>
            <button onclick="closeQR()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-black text-[10px] py-2 rounded uppercase transition-colors">Close</button>
        </div>
    </div>

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col mb-8 gap-6 items-center text-center">
            
            <div class="flex flex-wrap justify-center items-center gap-4 w-full">
                <h1 class="text-2xl font-black text-white italic tracking-tighter">POLY <span class="text-blue-500">MONITOR</span></h1>
                <div id="status-bar" class="text-[9px] font-mono text-gray-400 bg-gray-900 px-3 py-1.5 rounded-full border border-gray-800 uppercase tracking-widest status-active">SYNCING...</div>
                
                <div onclick="openQR(); copyDonation();" class="donate-pulse flex items-center gap-2 bg-yellow-500/10 border border-yellow-500/30 px-3 py-1.5 rounded-full cursor-pointer">
                    <span class="text-[9px] font-black text-yellow-500 uppercase">Donate</span>
                    <span id="donation-addr" class="text-[9px] font-mono text-yellow-200/70">0xE54...A4Eb</span>
                </div>

                <a href="https://x.com/raspberrygov" target="_blank" class="flex items-center gap-2 bg-white/5 border border-white/10 px-4 py-1.5 rounded-full hover:bg-white/10 transition-all">
                    <span class="text-[9px] font-black text-white uppercase tracking-tighter">Follow us</span>
                    <svg class="h-3.5 w-3.5 fill-current text-white" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                </a>
            </div>

            <div id="favorites-list" class="flex flex-wrap justify-center gap-2 w-full max-w-4xl"></div>

            <div class="flex items-center bg-[#161b22] border border-gray-800 rounded-xl p-1.5 shadow-2xl w-full max-w-lg">
                <button onclick="toggleFavorite()" id="fav-btn" class="px-3 transition-transform active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="star-icon"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.921-.755 1.688-1.54 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.784.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
                </button>
                <input type="text" id="wallet-input" placeholder="Wallet Address (0x...)" class="bg-transparent text-sm font-mono px-3 py-2 w-full outline-none text-blue-400 placeholder:text-gray-700" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="updateUser()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-black px-6 py-2.5 rounded-lg uppercase tracking-tight ml-1">Switch</button>
            </div>

            <div class="lg:hidden flex w-full bg-gray-900 border border-gray-800 rounded-xl p-1">
                <button onclick="switchTab('btc')" id="tab-btc" class="flex-1 py-3 text-[11px] font-black rounded-lg bg-orange-500 text-black">BTC</button>
                <button onclick="switchTab('eth')" id="tab-eth" class="flex-1 py-3 text-[11px] font-black rounded-lg text-gray-500">ETH</button>
                <button onclick="switchTab('sol')" id="tab-sol" class="flex-1 py-3 text-[11px] font-black rounded-lg text-gray-500">SOL</button>
                <button onclick="switchTab('xrp')" id="tab-xrp" class="flex-1 py-3 text-[11px] font-black rounded-lg text-gray-500">XRP</button>
            </div>
        </header>

        <div id="swipe-area" class="grid grid-cols-1 lg:grid-cols-4 gap-4 touch-pan-y">
            <div id="wrapper-btc" class="mobile-col active lg:flex flex-col h-[65vh]">
                <h2 class="bg-orange-500/10 text-orange-500 text-[10px] font-black p-2.5 mb-3 rounded border border-orange-500/20 text-center uppercase tracking-[0.2em]">Bitcoin</h2>
                <div id="col-btc" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div id="wrapper-eth" class="mobile-col lg:flex flex-col h-[65vh]">
                <h2 class="bg-blue-500/10 text-blue-500 text-[10px] font-black p-2.5 mb-3 rounded border border-blue-500/20 text-center uppercase tracking-[0.2em]">Ethereum</h2>
                <div id="col-eth" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div id="wrapper-sol" class="mobile-col lg:flex flex-col h-[65vh]">
                <h2 class="bg-purple-500/10 text-purple-500 text-[10px] font-black p-2.5 mb-3 rounded border border-purple-500/20 text-center uppercase tracking-[0.2em]">Solana</h2>
                <div id="col-sol" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div id="wrapper-xrp" class="mobile-col lg:flex flex-col h-[65vh]">
                <h2 class="bg-teal-500/10 text-teal-500 text-[10px] font-black p-2.5 mb-3 rounded border border-teal-500/20 text-center uppercase tracking-[0.2em]">XRP</h2>
                <div id="col-xrp" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
        </div>
    </div>

    <script>
        let CURRENT_USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth', 'sol', 'xrp'];
        let activeTabIndex = 0;

        function init() {
            renderFavorites(); updateStarUI(); sync();
            setInterval(sync, 10000);
            setupSwipe();
        }

        function setupSwipe() {
            let startX = 0;
            document.getElementById('swipe-area').addEventListener('touchstart', e => startX = e.changedTouches[0].screenX);
            document.getElementById('swipe-area').addEventListener('touchend', e => {
                if (window.innerWidth >= 1024) return;
                let diff = startX - e.changedTouches[0].screenX;
                if (Math.abs(diff) > 60) {
                    activeTabIndex = diff > 0 ? (activeTabIndex + 1) % 4 : (activeTabIndex - 1 + 4) % 4;
                    switchTab(ASSETS[activeTabIndex]);
                }
            });
        }

        function switchTab(asset) {
            activeTabIndex = ASSETS.indexOf(asset);
            ASSETS.forEach(id => {
                document.getElementById(`wrapper-${id}`).classList.remove('active');
                document.getElementById(`tab-${id}`).className = "flex-1 py-3 text-[11px] font-black rounded-lg text-gray-500";
            });
            const colors = {btc: 'bg-orange-500', eth: 'bg-blue-500', sol: 'bg-purple-500', xrp: 'bg-teal-500'};
            document.getElementById(`wrapper-${asset}`).classList.add('active');
            document.getElementById(`tab-${asset}`).className = `flex-1 py-3 text-[11px] font-black rounded-lg ${colors[asset]} text-black`;
        }

        async function sync() {
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${CURRENT_USER}&limit=60`);
                const data = await res.json();
                ASSETS.forEach(id => document.getElementById(`col-${id}`).innerHTML = '');

                if (!data || data.length === 0) {
                    document.getElementById('status-bar').innerText = "NO ACTIVITY FOUND";
                    return;
                }

                data.forEach(item => {
                    const t = item.title.toLowerCase();
                    let col = null;
                    if (t.includes('btc')||t.includes('bitcoin')) col = 'btc';
                    else if (t.includes('eth')||t.includes('ethereum')) col = 'eth';
                    else if (t.includes('sol')) col = 'sol';
                    else if (t.includes('xrp')) col = 'xrp';
                    
                    if (col) document.getElementById(`col-${col}`).insertAdjacentHTML('beforeend', createCard(item));
                });
                document.getElementById('status-bar').innerText = `LIVE: ${new Date().toLocaleTimeString()}`;
            } catch (e) { document.getElementById('status-bar').innerText = "SYNC ERROR"; }
        }

        function createCard(item) {
            const isBuy = item.side === 'BUY';
            let direction = "UNKNOWN";
            const outcome = item.outcome?.toLowerCase();
            if (item.outcomeIndex === "0" || outcome === "yes") direction = "UP";
            else if (item.outcomeIndex === "1" || outcome === "no") direction = "DOWN";
            else if (item.outcome) direction = item.outcome.toUpperCase();

            return `
                <div class="bg-[#161b22] border border-gray-800 rounded-lg p-4 hover:border-gray-600 transition-colors shadow-xl">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black ${isBuy?'text-green-500':'text-red-400'} uppercase tracking-[0.1em] bg-black/40 px-2.5 py-1 rounded">${item.side} ${item.type}</span>
                        <span class="text-[12px] text-white font-black font-mono tracking-tighter">${new Date(item.timestamp*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
                    </div>
                    <div class="text-[13px] font-bold text-gray-200 mb-4 leading-tight">${item.title}</div>
                    <div class="flex justify-between items-end bg-black/60 p-3 rounded-lg border border-gray-800/50">
                        <div>
                            <div class="text-[9px] text-gray-500 uppercase font-black tracking-widest mb-1">Position</div>
                            <div class="text-[14px] font-black ${direction==='UP'?'text-green-400':'text-red-400'}">${direction}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[9px] text-gray-500 uppercase font-black tracking-widest mb-1">Value</div>
                            <div class="text-[13px] font-mono font-black text-blue-400 leading-none">$${parseFloat(item.usdcSize).toLocaleString()}</div>
                            <a href="https://polymarket.com/event/${item.slug}" target="_blank" class="text-[10px] text-gray-600 hover:text-white underline mt-2 block">Source</a>
                        </div>
                    </div>
                </div>`;
        }

        function updateUser(address = null) {
            const addr = (address || document.getElementById('wallet-input').value).trim().toLowerCase();
            if (addr.startsWith('0x') && addr.length === 42) {
                CURRENT_USER = addr; 
                document.getElementById('wallet-input').value = addr;
                ASSETS.forEach(id => document.getElementById(`col-${id}`).innerHTML = '<div class="p-10 text-center text-xs animate-pulse text-gray-700">FETCHING DATA...</div>');
                renderFavorites(); updateStarUI(); sync();
            }
        }

        function toggleFavorite() {
            let favs = JSON.parse(localStorage.getItem('poly_favorites') || '[]');
            if (favs.includes(CURRENT_USER)) favs = favs.filter(a => a !== CURRENT_USER);
            else favs.push(CURRENT_USER);
            localStorage.setItem('poly_favorites', JSON.stringify(favs));
            renderFavorites(); updateStarUI();
        }

        function renderFavorites() {
            const list = document.getElementById('favorites-list');
            list.innerHTML = '';
            JSON.parse(localStorage.getItem('poly_favorites') || '[]').forEach(addr => {
                const isActive = addr === CURRENT_USER;
                const div = document.createElement('div');
                div.className = `flex items-center bg-gray-900 border ${isActive?'border-blue-500 ring-2 ring-blue-500/10 shadow-lg':'border-gray-800'} rounded-lg overflow-hidden transition-all`;
                div.innerHTML = `<button onclick="updateUser('${addr}')" class="px-3 py-2 text-[10px] font-mono ${isActive?'text-white font-black':'text-gray-500 hover:text-gray-300'}">${addr.slice(0,6)}...${addr.slice(-4)}</button>`;
                list.appendChild(div);
            });
        }

        function updateStarUI() {
            const isFav = JSON.parse(localStorage.getItem('poly_favorites') || '[]').includes(CURRENT_USER);
            document.getElementById('star-icon').setAttribute('fill', isFav ? '#fbbf24' : 'none');
            document.getElementById('star-icon').setAttribute('stroke', isFav ? '#fbbf24' : 'currentColor');
        }

        function openQR() { document.getElementById('qr-modal').classList.remove('hidden'); }
        function closeQR() { document.getElementById('qr-modal').classList.add('hidden'); }
        function copyDonation() { 
            navigator.clipboard.writeText("0xE54AA4F86317457D6E89250A55BA9982538dA4Eb");
            const d = document.getElementById('donation-addr');
            d.innerText = "COPIED!"; setTimeout(()=>d.innerText="0xE54...A4Eb", 2000);
        }
        init();
    </script>
</body>
</html>
