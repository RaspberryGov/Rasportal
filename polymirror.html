<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Pro Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .grid-header { background: linear-gradient(to bottom, #1e222d, #161b22); }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-2">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col mb-4 gap-2 items-center text-center">
            <h1 class="text-xl font-black text-white italic tracking-tighter">POLY <span class="text-blue-500">QUANT FEED</span></h1>
            <div class="flex items-center bg-[#161b22] border border-gray-800 rounded-lg p-1 w-full max-w-md">
                <input type="text" id="wallet-input" class="bg-transparent text-xs font-mono px-3 py-1.5 w-full outline-none text-blue-400" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="updateUser()" class="bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded uppercase">Track</button>
            </div>
            <div id="status-bar" class="text-[8px] font-mono text-gray-500 uppercase tracking-widest">Initial Sync...</div>
        </header>

        <div id="analytics-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-4 gap-2 mb-6">
            </div>

        <hr class="border-gray-800 mb-6">

        <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="flex flex-col h-[60vh]"><h2 class="bg-orange-500 text-black text-[10px] font-black p-1.5 mb-2 rounded text-center">BITCOIN FEED</h2><div id="col-btc" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[60vh]"><h2 class="bg-blue-500 text-black text-[10px] font-black p-1.5 mb-2 rounded text-center">ETHEREUM FEED</h2><div id="col-eth" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[60vh]"><h2 class="bg-purple-500 text-black text-[10px] font-black p-1.5 mb-2 rounded text-center">SOLANA FEED</h2><div id="col-sol" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[60vh]"><h2 class="bg-teal-500 text-black text-[10px] font-black p-1.5 mb-2 rounded text-center">XRP FEED</h2><div id="col-xrp" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
        </div>
    </div>

    <script>
        let CURRENT_USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth', 'sol', 'xrp'];
        
        // Data structure for counters
        let stats = {};
        function resetStats() {
            ASSETS.forEach(a => {
                stats[a] = {
                    "5 MINUTE": { buyCount: 0, sellCount: 0, volume: 0, lastWindow: "" },
                    "15 MINUTE": { buyCount: 0, sellCount: 0, volume: 0, lastWindow: "" }
                };
            });
        }
        resetStats();

        function getDurationLabel(title) {
            const timeRegex = /(\d{1,2}):(\d{2})(AM|PM|am|pm)-(\d{1,2}):(\d{2})(AM|PM|am|pm)/;
            const match = title.match(timeRegex);
            if (match) {
                let h1 = parseInt(match[1]); const m1 = parseInt(match[2]); const p1 = match[3].toLowerCase();
                let h2 = parseInt(match[4]); const m2 = parseInt(match[5]); const p2 = match[6].toLowerCase();
                if (p1 === 'pm' && h1 < 12) h1 += 12; if (p1 === 'am' && h1 === 12) h1 = 0;
                if (p2 === 'pm' && h2 < 12) h2 += 12; if (p2 === 'am' && h2 === 12) h2 = 0;
                const d1 = new Date(0,0,0, h1, m1); const d2 = new Date(0,0,0, h2, m2);
                let diff = (d2 - d1) / 60000; if (diff < 0) diff += 1440;
                return { label: `${diff} MINUTE`, window: match[0] };
            }
            return { label: "SHORT-TERM", window: "" };
        }

        async function sync() {
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${CURRENT_USER}&limit=100`);
                const data = await res.json();
                
                ASSETS.forEach(id => document.getElementById(`col-${id}`).innerHTML = '');
                resetStats(); // Reset and recalculate based on current visible feed

                data.forEach(item => {
                    const title = item.title;
                    if (!title.toLowerCase().includes('up or down')) return;

                    let assetKey = null;
                    if (title.toLowerCase().includes('btc') || title.toLowerCase().includes('bitcoin')) assetKey = 'btc';
                    else if (title.toLowerCase().includes('eth') || title.toLowerCase().includes('ethereum')) assetKey = 'eth';
                    else if (title.toLowerCase().includes('sol')) assetKey = 'sol';
                    else if (title.toLowerCase().includes('xrp')) assetKey = 'xrp';
                    
                    if (assetKey) {
                        const info = getDurationLabel(title);
                        const duration = info.label;
                        
                        // Update Analytics Stats
                        if (stats[assetKey][duration]) {
                            const side = item.side.toUpperCase();
                            if (side === 'BUY') stats[assetKey][duration].buyCount++;
                            if (side === 'SELL') stats[assetKey][duration].sellCount++;
                            stats[assetKey][duration].volume += parseFloat(item.usdcSize);
                        }

                        renderCard(assetKey, item, duration);
                    }
                });
                renderAnalytics();
                document.getElementById('status-bar').innerText = `LIVE: ${new Date().toLocaleTimeString()}`;
            } catch (e) { document.getElementById('status-bar').innerText = "SYNC ERROR"; }
        }

        function renderAnalytics() {
            const container = document.getElementById('analytics-grid');
            container.innerHTML = '';
            
            ASSETS.forEach(a => {
                const div = document.createElement('div');
                div.className = "bg-[#161b22] border border-gray-800 rounded-lg overflow-hidden flex flex-col";
                const color = a === 'btc' ? 'orange-500' : a === 'eth' ? 'blue-500' : a === 'sol' ? 'purple-500' : 'teal-500';
                
                div.innerHTML = `
                    <div class="bg-${color} text-black text-[9px] font-black py-1 px-2 uppercase tracking-tighter">${a} Analytics</div>
                    <div class="grid grid-cols-2 text-[8px] border-b border-gray-800">
                        <div class="p-2 border-r border-gray-800">
                            <div class="text-gray-500 font-bold mb-1 underline">5 MIN MARKET</div>
                            <div class="flex justify-between"><span>BUYS:</span><span class="text-green-400">${stats[a]["5 MINUTE"].buyCount}</span></div>
                            <div class="flex justify-between"><span>SELLS:</span><span class="text-red-400">${stats[a]["5 MINUTE"].sellCount}</span></div>
                            <div class="mt-1 font-mono text-blue-400">$${Math.round(stats[a]["5 MINUTE"].volume)}</div>
                        </div>
                        <div class="p-2">
                            <div class="text-gray-500 font-bold mb-1 underline">15 MIN MARKET</div>
                            <div class="flex justify-between"><span>BUYS:</span><span class="text-green-400">${stats[a]["15 MINUTE"].buyCount}</span></div>
                            <div class="flex justify-between"><span>SELLS:</span><span class="text-red-400">${stats[a]["15 MINUTE"].sellCount}</span></div>
                            <div class="mt-1 font-mono text-blue-400">$${Math.round(stats[a]["15 MINUTE"].volume)}</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderCard(columnId, item, duration) {
            let direction = (item.outcomeIndex === "1" || item.outcome?.toLowerCase() === 'no') ? "DOWN" : "UP";
            const side = item.side.toUpperCase();
            const sharePrice = (parseFloat(item.usdcSize) / parseFloat(item.size)).toFixed(2);

            const html = `
                <div class="bg-[#161b22] border border-gray-800 rounded p-2 hover:border-blue-500/50 transition-all shadow-md">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[8px] font-black text-blue-400 bg-blue-500/10 px-1 rounded uppercase">${duration}</span>
                        <span class="text-[9px] text-gray-500">${new Date(item.timestamp*1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div class="text-[11px] font-bold text-gray-200 mb-2 truncate">${item.title}</div>
                    <div class="grid grid-cols-3 gap-1 bg-black/40 p-1.5 rounded border border-gray-800/50 text-center">
                        <div><div class="text-[7px] text-gray-500 uppercase">POS</div><div class="text-[10px] font-black ${direction==='UP'?'text-green-500':'text-red-500'}">${direction}</div></div>
                        <div><div class="text-[7px] text-gray-500 uppercase">PRICE</div><div class="text-[10px] font-mono text-yellow-500">${sharePrice}¢</div></div>
                        <div><div class="text-[7px] text-gray-500 uppercase">TOTAL</div><div class="text-[10px] font-mono text-blue-400">$${Math.round(item.usdcSize)}</div></div>
                    </div>
                    <div class="mt-1.5 text-[8px] font-black text-center ${side==='BUY'?'text-green-400':'text-red-400'} opacity-70 border-t border-gray-800 pt-1">TYPE: ${side}</div>
                </div>
            `;
            document.getElementById(`col-${columnId}`).insertAdjacentHTML('beforeend', html);
        }

        function updateUser() {
            const val = document.getElementById('wallet-input').value.trim();
            if (val.length === 42) { CURRENT_USER = val; sync(); }
        }

        sync();
        setInterval(sync, 15000);
    </script>
</body>
</html>
