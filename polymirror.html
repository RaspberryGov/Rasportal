<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Feed: @rename</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e14] text-white font-sans p-4">
    <div class="max-w-xl mx-auto">
        <header class="flex justify-between items-center mb-6 py-4 border-b border-gray-800">
            <h1 class="text-xl font-black tracking-tighter text-blue-500 uppercase">@rename Activity</h1>
            <span id="update-timer" class="text-[10px] font-mono text-gray-500 uppercase">Syncing...</span>
        </header>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20 text-gray-600 animate-pulse uppercase text-xs tracking-widest">Scanning Blockchain...</div>
        </div>
    </div>

    <script>
        const USER_ADDRESS = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";

        async function fetchActivity() {
            try {
                // Fetch the exact activity feed from the Data API
                const response = await fetch(`https://data-api.polymarket.com/activity?user=${USER_ADDRESS}&limit=15`);
                const data = await response.json();

                render(data);
                document.getElementById('update-timer').innerText = "Last Sync: " + new Date().toLocaleTimeString();
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        function render(items) {
            const container = document.getElementById('feed');
            
            if (!items || items.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 italic py-10">No recent activity found.</div>`;
                return;
            }

            container.innerHTML = items.map(item => {
                // 1. Determine Direction (Up/Down)
                // In binary markets (Up/Down), index 0 is usually 'Up' and 1 is 'Down'
                let direction = "Unknown";
                if (item.outcomeIndex === "0") direction = "UP";
                if (item.outcomeIndex === "1") direction = "DOWN";

                // Fallback: If title contains "Up" or "Down" but index is weird, we check the outcome field
                if (item.outcome) direction = item.outcome.toUpperCase();

                // 2. Fix Dollar Amount ($NaN fix)
                // The API uses 'usdcSize' for the total dollar amount spent
                const totalDollars = item.usdcSize ? parseFloat(item.usdcSize).toFixed(2) : "0.00";
                const sharePrice = item.price ? parseFloat(item.price).toFixed(3) : "0.000";
                const isBuy = item.side === 'BUY';

                return `
                    <div class="bg-[#161b22] border-l-4 ${isBuy ? 'border-green-500' : 'border-red-500'} p-4 rounded-r-xl shadow-lg">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${item.side} ${item.type}</span>
                            <span class="text-[10px] font-mono text-gray-600">${new Date(item.timestamp * 1000).toLocaleTimeString()}</span>
                        </div>
                        
                        <div class="text-sm font-bold text-gray-100 mb-3 leading-tight">
                            ${item.title}
                        </div>

                        <div class="flex justify-between items-end border-t border-gray-800 pt-3 mt-1">
                            <div>
                                <div class="text-[9px] text-gray-500 uppercase font-bold tracking-tighter">Direction</div>
                                <div class="text-lg font-black ${direction === 'UP' ? 'text-green-400' : 'text-red-400'}">${direction}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-[9px] text-gray-500 uppercase font-bold tracking-tighter">Position Value</div>
                                <div class="text-lg font-mono text-white">$${totalDollars}</div>
                                <div class="text-[10px] text-gray-500">at $${sharePrice} / share</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Initialize and set interval
        fetchActivity();
        setInterval(fetchActivity, 15000); // 15 seconds refresh
    </script>
</body>
</html>
