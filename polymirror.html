<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polymarket Hard-Sync Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px; }
    </style>
</head>
<body class="bg-[#0d1117] text-[#c9d1d9] font-sans p-2">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col items-center mb-6">
            <h1 class="text-xl font-black text-white italic uppercase tracking-tighter">BTC · ETH <span class="text-blue-500">Live Monitor</span></h1>
            <div class="flex mt-2 w-full max-w-md bg-[#010409] border border-[#30363d] rounded overflow-hidden">
                <input type="text" id="wallet" class="bg-transparent px-3 py-2 text-xs font-mono w-full text-blue-400 focus:outline-none" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="sync()" class="bg-blue-600 text-white px-6 text-[10px] font-bold uppercase hover:bg-blue-500">Track</button>
            </div>
            <div id="next-reset" class="text-[9px] font-mono text-gray-500 mt-2 uppercase tracking-widest">Syncing with Polymarket Event IDs...</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="space-y-4">
                <h2 class="bg-orange-600 text-black text-[11px] font-black p-2 rounded text-center uppercase">Bitcoin Monitor</h2>
                <div id="btc-5m" class="stat-card"></div>
                <div id="btc-15m" class="stat-card"></div>
            </div>

            <div class="space-y-4">
                <h2 class="bg-blue-600 text-black text-[11px] font-black p-2 rounded text-center uppercase">Ethereum Monitor</h2>
                <div id="eth-5m" class="stat-card"></div>
                <div id="eth-15m" class="stat-card"></div>
            </div>
        </div>

        <hr class="border-gray-800 mb-6">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="h-[40vh] flex flex-col">
                <h3 class="text-[10px] font-bold text-gray-500 mb-2 uppercase">BTC Feed</h3>
                <div id="feed-btc" class="overflow-y-auto custom-scrollbar space-y-2 pr-2"></div>
            </div>
            <div class="h-[40vh] flex flex-col">
                <h3 class="text-[10px] font-bold text-gray-500 mb-2 uppercase">ETH Feed</h3>
                <div id="feed-eth" class="overflow-y-auto custom-scrollbar space-y-2 pr-2"></div>
            </div>
        </div>
    </div>

    <script>
        let DATA = {};
        const ASSETS = ['btc', 'eth'];

        // Core logic: Calculate the exact "Window Title" that Polymarket is currently using
        function getActiveWindowTitle(tfMins) {
            const now = new Date();
            const ms = now.getTime();
            const interval = tfMins * 60 * 1000;
            const startMs = Math.floor(ms / interval) * interval;
            const endMs = startMs + interval;

            const format = (d) => {
                let h = d.getUTCHours();
                let m = d.getUTCMinutes();
                const ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12 || 12;
                return `${h}:${String(m).padStart(2, '0')}${ampm}`;
            };

            const startStr = format(new Date(startMs));
            const endStr = format(new Date(endMs));
            return `${startStr}-${endStr}`; 
        }

        function initData() {
            ASSETS.forEach(a => {
                DATA[a] = {
                    "5m": { window: getActiveWindowTitle(5), upC: 0, upV: 0, downC: 0, downV: 0 },
                    "15m": { window: getActiveWindowTitle(15), upC: 0, upV: 0, downC: 0, downV: 0 }
                };
            });
        }

        async function sync() {
            const wallet = document.getElementById('wallet').value.trim();
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${wallet}&limit=100`);
                const trades = await res.json();
                
                initData();
                ASSETS.forEach(a => document.getElementById(`feed-${a}`).innerHTML = '');

                trades.forEach(t => {
                    const title = t.title;
                    const asset = ASSETS.find(a => title.toLowerCase().includes(a) || (a==='btc' && title.toLowerCase().includes('bit')));
                    if (!asset) return;

                    const timeframe = title.includes('5 min') ? '5m' : '15m';
                    const isLive = title.includes(DATA[asset][timeframe].window);

                    if (isLive) {
                        const isDown = (t.outcomeIndex == "1") || (t.outcome?.toLowerCase() === 'no');
                        const vol = parseFloat(t.usdcSize) || 0;
                        if (isDown) { DATA[asset][timeframe].downC++; DATA[asset][timeframe].downV += vol; }
                        else { DATA[asset][timeframe].upC++; DATA[asset][timeframe].upV += vol; }
                    }
                    renderFeed(asset, t, isLive);
                });
                updateUI();
            } catch (err) { console.error(err); }
        }

        function updateUI() {
            ASSETS.forEach(a => {
                ['5m', '15m'].forEach(tf => {
                    const d = DATA[a][tf];
                    const container = document.getElementById(`${a}-${tf}`);
                    container.innerHTML = `
                        <div class="flex justify-between items-center border-b border-gray-800 pb-2 mb-3">
                            <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">${tf === '5m' ? '5 Minute' : '15 Minute'}</span>
                            <span class="text-[9px] font-mono text-gray-500 italic">${d.window} ET</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-black/40 p-3 rounded border-l-4 border-green-500">
                                <div class="text-[8px] text-gray-500 font-bold uppercase">Total UP Positions</div>
                                <div class="text-xl font-black text-green-400">${d.upC}</div>
                                <div class="text-[10px] text-gray-400 font-mono">$${Math.round(d.upV).toLocaleString()} Vol</div>
                            </div>
                            <div class="bg-black/40 p-3 rounded border-l-4 border-red-500">
                                <div class="text-[8px] text-gray-500 font-bold uppercase">Total DOWN Positions</div>
                                <div class="text-xl font-black text-red-400">${d.downC}</div>
                                <div class="text-[10px] text-gray-400 font-mono">$${Math.round(d.downV).toLocaleString()} Vol</div>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function renderFeed(asset, t, isLive) {
            const isDown = (t.outcomeIndex == "1") || (t.outcome?.toLowerCase() === 'no');
            const html = `
                <div class="bg-[#161b22] border ${isLive?'border-blue-500/30':'border-gray-800'} rounded p-2 text-[10px]">
                    <div class="flex justify-between text-[8px] text-gray-500 mb-1">
                        <span class="font-bold">${t.title.includes('5 min') ? '5M' : '15M'}</span>
                        <span>${new Date(t.timestamp*1000).toLocaleTimeString()}</span>
                    </div>
                    <div class="truncate font-bold mb-2">${t.title}</div>
                    <div class="flex justify-between items-center bg-black/40 p-1.5 rounded">
                        <span class="${isDown?'text-red-500':'text-green-500'} font-black">${isDown?'DOWN':'UP'}</span>
                        <span class="text-yellow-500 font-mono">$${Math.round(t.usdcSize)}</span>
                    </div>
                </div>`;
            document.getElementById(`feed-${asset}`).insertAdjacentHTML('beforeend', html);
        }

        setInterval(sync, 10000);
        sync();
    </script>
</body>
</html>
