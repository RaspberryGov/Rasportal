<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Poly Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px; }
        .flash-red { animation: flash 1s infinite; color: #ff4444 !important; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        body { font-size: 13px; }
        .wallet-tab { cursor: pointer; font-size: 11px; transition: 0.2s; }
        .active-tab { background: #238636 !important; color: white; border-color: #2ea043; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-4">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col items-center mb-5 text-center">
            <h1 class="text-2xl font-black text-white italic uppercase tracking-tighter">Poly Monitor</h1>
            <p class="text-[9px] text-gray-500 uppercase tracking-[0.3em]">developed by Freeberry</p>
            
            <div class="flex mt-3 w-full max-w-md bg-[#161b22] border border-gray-700 rounded p-1">
                <input type="text" id="wallet" class="bg-transparent px-3 py-1.5 text-xs font-mono w-full text-blue-400 outline-none" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="saveWallet()" class="px-2 text-gray-400 hover:text-yellow-500 text-lg" title="Favorite">★</button>
                <button onclick="sync()" class="bg-blue-600 text-white px-4 py-1.5 rounded text-[10px] font-black uppercase hover:bg-blue-500 ml-1">Track</button>
            </div>

            <div id="favorites-bar" class="flex flex-wrap gap-2 mt-3 justify-center"></div>

            <div class="mt-3">
                <a href="https://etherscan.io/address/0xf6963d4CdbB6F26D753bDa303e9513132AFB1b7d" target="_blank" class="bg-[#238636] hover:bg-[#2ea043] text-white text-[9px] font-bold py-1 px-3 rounded-full uppercase tracking-wider inline-flex items-center gap-2">
                    <span>☕ Support Development</span>
                </a>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="space-y-3">
                <h2 class="bg-orange-600 text-black text-[10px] font-black p-1 rounded text-center uppercase">Bitcoin Monitor</h2>
                <div id="btc-5m-box"></div>
                <div id="btc-15m-box"></div>
            </div>
            <div class="space-y-3">
                <h2 class="bg-blue-600 text-black text-[10px] font-black p-1 rounded text-center uppercase">Ethereum Monitor</h2>
                <div id="eth-5m-box"></div>
                <div id="eth-15m-box"></div>
            </div>
        </div>

        <hr class="border-gray-800/50 mb-4">

        <div class="grid grid-cols-2 gap-4">
            <div id="feed-btc" class="h-[42vh] overflow-y-auto custom-scrollbar space-y-1.5 pr-1"></div>
            <div id="feed-eth" class="h-[42vh] overflow-y-auto custom-scrollbar space-y-1.5 pr-1"></div>
        </div>
    </div>

    <script>
        let DATA = {};
        let CURRENT_WALLET = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth'];
        let favorites = JSON.parse(localStorage.getItem('poly_favorites') || '[]');

        function getCountdownData(mins) {
            const now = new Date();
            const msInWindow = mins * 60 * 1000;
            const timeRemaining = msInWindow - (now.getTime() % msInWindow);
            const totalSecs = Math.floor(timeRemaining / 1000);
            return { str: `${Math.floor(totalSecs / 60)}:${(totalSecs % 60).toString().padStart(2,'0')}`, isCritical: totalSecs <= 10 };
        }

        function saveWallet() {
            const val = document.getElementById('wallet').value.trim();
            if (val && !favorites.includes(val)) {
                favorites.push(val);
                localStorage.setItem('poly_favorites', JSON.stringify(favorites));
                renderFavorites();
            }
        }

        function removeFavorite(addr, e) {
            e.stopPropagation();
            favorites = favorites.filter(f => f !== addr);
            localStorage.setItem('poly_favorites', JSON.stringify(favorites));
            renderFavorites();
        }

        function renderFavorites() {
            const bar = document.getElementById('favorites-bar');
            bar.innerHTML = favorites.map(addr => `
                <div onclick="switchWallet('${addr}')" class="wallet-tab flex items-center gap-2 px-2 py-1 bg-[#161b22] border border-gray-700 rounded ${addr === CURRENT_WALLET ? 'active-tab' : 'text-gray-400'}">
                    <span>${addr.substring(0,6)}...</span>
                    <span onclick="removeFavorite('${addr}', event)" class="hover:text-red-500 font-bold">×</span>
                </div>
            `).join('');
        }

        function switchWallet(addr) {
            CURRENT_WALLET = addr;
            document.getElementById('wallet').value = addr;
            renderFavorites();
            sync();
        }

        function initData() {
            ASSETS.forEach(a => {
                DATA[a] = { "5m": { activeId: null, upC: 0, upV: 0, downC: 0, downV: 0 }, "15m": { activeId: null, upC: 0, upV: 0, downC: 0, downV: 0 } };
            });
        }

        async function sync() {
            CURRENT_WALLET = document.getElementById('wallet').value.trim();
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${CURRENT_WALLET}&limit=100`);
                const trades = await res.json();
                initData();
                ASSETS.forEach(a => document.getElementById(`feed-${a}`).innerHTML = '');

                trades.forEach(t => {
                    const slug = t.slug || "";
                    const asset = ASSETS.find(a => slug.toLowerCase().includes(a));
                    if (!asset) return;
                    const tf = slug.includes('15m') || t.title.toLowerCase().includes('15 min') ? '15m' : '5m';
                    const marketId = slug.split('-').pop();

                    if (!DATA[asset][tf].activeId) DATA[asset][tf].activeId = marketId;
                    if (marketId === DATA[asset][tf].activeId) {
                        const isDown = (t.outcomeIndex == "1") || (t.outcome?.toLowerCase().includes('no') || t.outcome?.toLowerCase().includes('down'));
                        const vol = parseFloat(t.usdcSize) || 0;
                        if (isDown) { DATA[asset][tf].downC++; DATA[asset][tf].downV += vol; }
                        else { DATA[asset][tf].upC++; DATA[asset][tf].upV += vol; }
                    }
                    renderRow(asset, t);
                });
                updateUI();
            } catch (err) { console.error(err); }
        }

        function updateUI() {
            ASSETS.forEach(a => {
                ['5m', '15m'].forEach(tf => {
                    const d = DATA[a][tf];
                    const cd = getCountdownData(tf === '5m' ? 5 : 15);
                    document.getElementById(`${a}-${tf}-box`).innerHTML = `
                        <div class="stat-card">
                            <div class="flex justify-between items-center mb-2 text-[8px] font-mono uppercase">
                                <span class="text-blue-400 font-bold">${tf} Window</span>
                                <span class="${cd.isCritical ? 'flash-red' : 'text-yellow-500'} font-bold">RESET: ${cd.str}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-black/40 p-2 rounded border-l-2 border-green-600">
                                    <div class="text-[7px] text-gray-500 font-bold uppercase mb-0.5">UP</div>
                                    <div class="text-xl font-black text-green-400">${d.upC} <span class="text-[10px] text-gray-600 font-normal ml-1">$${Math.round(d.upV)}</span></div>
                                </div>
                                <div class="bg-black/40 p-2 rounded border-l-2 border-red-600">
                                    <div class="text-[7px] text-gray-500 font-bold uppercase mb-0.5">DOWN</div>
                                    <div class="text-xl font-black text-red-400">${d.downC} <span class="text-[10px] text-gray-600 font-normal ml-1">$${Math.round(d.downV)}</span></div>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function renderRow(asset, t) {
            const isDown = (t.outcomeIndex == "1") || (t.outcome?.toLowerCase().includes('no') || t.outcome?.toLowerCase().includes('down'));
            const price = (parseFloat(t.usdcSize) / parseFloat(t.size)).toFixed(2);
            const is15m = t.slug.includes('15m') || t.title.toLowerCase().includes('15 min');
            const html = `
                <div class="bg-[#161b22] border border-gray-800 rounded p-2 text-[10px]">
                    <div class="flex justify-between text-[7px] text-gray-500 mb-1 font-mono uppercase font-bold">
                        <span>${is15m?'15M':'5M'}</span>
                        <span>${new Date(t.timestamp*1000).toLocaleTimeString([], {hour12:false})}</span>
                    </div>
                    <div class="truncate font-bold text-gray-300 mb-1 text-xs tracking-tight">${t.title}</div>
                    <div class="flex justify-between items-center bg-black/30 p-1.5 rounded">
                        <span class="${isDown?'text-red-500':'text-green-500'} font-black uppercase text-[9px]">${isDown?'Down':'Up'}</span>
                        <span class="text-yellow-500 font-mono font-bold text-xs">${price}¢</span>
                        <span class="text-blue-400 font-mono font-bold text-xs">$${Math.round(t.usdcSize)}</span>
                    </div>
                </div>`;
            document.getElementById(`feed-${asset}`).insertAdjacentHTML('beforeend', html);
        }

        renderFavorites();
        setInterval(sync, 8000); 
        setInterval(updateUI, 1000); 
        sync();
    </script>
</body>
</html>
