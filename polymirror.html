<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Crypto Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        
        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: rgba(59, 130, 246, 1); }
            100% { border-color: rgba(59, 130, 246, 0.5); }
        }
        .status-active { animation: pulse-border 2s infinite; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-4">
    <div class="max-w-[1600px] mx-auto">
        
        <header class="flex flex-col mb-6 gap-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <h1 class="text-xl font-black text-white italic tracking-tighter">POLY <span class="text-blue-500">MONITOR</span></h1>
                    <div id="status-bar" class="text-[9px] font-mono text-gray-500 bg-gray-900 px-3 py-1 rounded-full border border-gray-800 uppercase tracking-widest status-active">
                        Initializing...
                    </div>
                </div>

                <div class="flex items-center bg-[#161b22] border border-gray-800 rounded-lg p-1 w-full md:w-auto shadow-xl">
                    <button onclick="toggleFavorite()" id="fav-btn" class="px-2 text-gray-500 hover:text-yellow-400 transition-colors" title="Favorite current address">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="star-icon">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.921-.755 1.688-1.54 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.784.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                        </svg>
                    </button>
                    <input 
                        type="text" 
                        id="wallet-input" 
                        placeholder="Enter Wallet Address (0x...)" 
                        class="bg-transparent text-[11px] font-mono px-3 py-1.5 w-full md:w-80 outline-none text-blue-400 placeholder:text-gray-600"
                        value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d"
                    >
                    <button onclick="clearInput()" class="px-2 text-gray-600 hover:text-red-400 transition-colors" title="Clear input">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    <button 
                        onclick="updateUser()" 
                        class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold px-4 py-1.5 rounded transition uppercase tracking-tighter ml-1"
                    >
                        Switch
                    </button>
                </div>
            </div>

            <div id="favorites-container" class="flex flex-wrap items-center gap-2 py-2 border-y border-gray-800/50">
                <span class="text-[9px] font-bold text-gray-600 uppercase tracking-widest mr-2">Favourited Monitors:</span>
                <div id="favorites-list" class="flex flex-wrap gap-2"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="flex flex-col h-[80vh]">
                <h2 class="bg-orange-500/10 text-orange-500 text-[10px] font-black p-2 mb-2 rounded border border-orange-500/20 text-center uppercase tracking-widest">Bitcoin</h2>
                <div id="col-btc" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div class="flex flex-col h-[80vh]">
                <h2 class="bg-blue-500/10 text-blue-500 text-[10px] font-black p-2 mb-2 rounded border border-blue-500/20 text-center uppercase tracking-widest">Ethereum</h2>
                <div id="col-eth" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div class="flex flex-col h-[80vh]">
                <h2 class="bg-purple-500/10 text-purple-500 text-[10px] font-black p-2 mb-2 rounded border border-purple-500/20 text-center uppercase tracking-widest">Solana</h2>
                <div id="col-sol" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div class="flex flex-col h-[80vh]">
                <h2 class="bg-teal-500/10 text-teal-500 text-[10px] font-black p-2 mb-2 rounded border border-teal-500/20 text-center uppercase tracking-widest">XRP</h2>
                <div id="col-xrp" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
        </div>
    </div>

    <script>
        let CURRENT_USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth', 'sol', 'xrp'];
        let favorites = JSON.parse(localStorage.getItem('poly_favorites') || '[]');

        function init() {
            renderFavorites();
            updateStarUI();
            sync();
            setInterval(sync, 10000);
        }

        function clearInput() {
            document.getElementById('wallet-input').value = '';
        }

        function updateUser(address = null) {
            const newAddress = address || document.getElementById('wallet-input').value.trim();
            if (newAddress.length === 42 && newAddress.startsWith('0x')) {
                CURRENT_USER = newAddress;
                document.getElementById('wallet-input').value = newAddress;
                ASSETS.forEach(id => {
                    document.getElementById(`col-${id}`).innerHTML = `<div class="animate-pulse mt-10 text-center text-[10px] text-gray-600">SYNCING...</div>`;
                });
                updateStarUI();
                sync();
            }
        }

        function toggleFavorite() {
            const addr = CURRENT_USER.toLowerCase();
            const index = favorites.indexOf(addr);
            if (index > -1) favorites.splice(index, 1);
            else favorites.push(addr);
            localStorage.setItem('poly_favorites', JSON.stringify(favorites));
            renderFavorites();
            updateStarUI();
        }

        function removeFavorite(addr, e) {
            e.stopPropagation();
            favorites = favorites.filter(a => a !== addr);
            localStorage.setItem('poly_favorites', JSON.stringify(favorites));
            renderFavorites();
            updateStarUI();
        }

        function updateStarUI() {
            const star = document.getElementById('star-icon');
            if (favorites.includes(CURRENT_USER.toLowerCase())) {
                star.setAttribute('fill', '#fbbf24');
                star.setAttribute('stroke', '#fbbf24');
            } else {
                star.setAttribute('fill', 'none');
                star.setAttribute('stroke', 'currentColor');
            }
        }

        function renderFavorites() {
            const list = document.getElementById('favorites-list');
            list.innerHTML = '';
            favorites.forEach(addr => {
                const short = addr.slice(0, 4) + '...' + addr.slice(-4);
                const chip = document.createElement('div');
                chip.className = `flex items-center bg-gray-900 border ${addr === CURRENT_USER.toLowerCase() ? 'border-blue-500' : 'border-gray-800'} rounded overflow-hidden`;
                chip.innerHTML = `
                    <button onclick="updateUser('${addr}')" class="px-2 py-1 text-[10px] font-mono text-gray-400 hover:text-white transition-colors">
                        ${short}
                    </button>
                    <button onclick="removeFavorite('${addr}', event)" class="px-1.5 py-1 bg-gray-800/50 hover:bg-red-900/30 text-gray-600 hover:text-red-400 border-l border-gray-800 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>`;
                list.appendChild(chip);
            });
        }

        async function sync() {
            try {
                const response = await fetch(`https://data-api.polymarket.com/activity?user=${CURRENT_USER}&limit=40`);
                const data = await response.json();
                ASSETS.forEach(id => document.getElementById(`col-${id}`).innerHTML = '');
                if (!data || data.length === 0) {
                    document.getElementById('status-bar').innerText = "NO RECENT ACTIVITY";
                    return;
                }
                data.forEach(item => {
                    const title = item.title.toLowerCase();
                    let targetCol = null;
                    if (title.includes('btc') || title.includes('bitcoin')) targetCol = 'btc';
                    else if (title.includes('eth') || title.includes('ethereum')) targetCol = 'eth';
                    else if (title.includes('solana') || title.includes('sol')) targetCol = 'sol';
                    else if (title.includes('xrp')) targetCol = 'xrp';
                    if (targetCol) document.getElementById(`col-${targetCol}`).insertAdjacentHTML('beforeend', createCard(item));
                });
                const shortAddr = CURRENT_USER.slice(0,6) + "..." + CURRENT_USER.slice(-4);
                document.getElementById('status-bar').innerText = `LIVE: ${shortAddr} | UPDATED: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                document.getElementById('status-bar').innerText = "OFFLINE - RETRYING...";
            }
        }

        function createCard(item) {
            let direction = "UNKNOWN";
            const outcome = item.outcome?.toLowerCase();
            if (item.outcomeIndex === "0" || outcome === "yes") direction = "UP";
            else if (item.outcomeIndex === "1" || outcome === "no") direction = "DOWN";
            else if (item.outcome) direction = item.outcome.toUpperCase();

            const isBuy = item.side === 'BUY';
            const value = item.usdcSize ? parseFloat(item.usdcSize).toLocaleString(undefined, {minimumFractionDigits: 2}) : "0.00";
            const price = item.price ? parseFloat(item.price).toFixed(3) : "0.000";
            
            const polyLink = `https://polymarket.com/event/${item.slug}`;

            return `
                <div class="bg-[#161b22] border border-gray-800 rounded-lg p-3 hover:border-gray-500 transition-all group">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[9px] font-bold ${isBuy ? 'text-green-500' : 'text-red-400'} uppercase tracking-widest">
                            ${item.side} ${item.type}
                        </span>
                        <span class="text-[12px] text-white font-black font-mono">
                            ${new Date(item.timestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        </span>
                    </div>
                    
                    <div class="flex items-center justify-between gap-2 mb-3 overflow-hidden">
                        <span class="text-[12px] font-bold text-gray-200 leading-tight truncate whitespace-nowrap" title="${item.title}">
                            ${item.title}
                        </span>
                        <a href="${polyLink}" target="_blank" class="text-gray-600 hover:text-blue-400 transition-colors shrink-0" title="View Market">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                        </a>
                    </div>

                    <div class="flex justify-between items-end bg-black/40 p-2 rounded border border-gray-800/50">
                        <div>
                            <div class="text-[8px] text-gray-500 uppercase font-bold tracking-widest">Position</div>
                            <div class="text-sm font-black ${direction === 'UP' ? 'text-green-400' : 'text-red-400'}">${direction}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[8px] text-gray-500 uppercase font-bold tracking-widest">Value</div>
                            <div class="text-xs font-mono font-bold text-white">$${value}</div>
                            <div class="text-[9px] text-gray-600 font-mono">$${price}</div>
                        </div>
                    </div>
                </div>`;
        }

        init();
    </script>
</body>
</html>
