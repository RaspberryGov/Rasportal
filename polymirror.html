<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Quant Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .stat-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; padding: 8px; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-2">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col mb-4 gap-2 items-center text-center">
            <h1 class="text-xl font-black text-white italic tracking-tighter uppercase">Poly <span class="text-blue-500">Event Tracker</span></h1>
            <div class="flex items-center bg-[#161b22] border border-gray-800 rounded-lg p-1 w-full max-w-md shadow-2xl">
                <input type="text" id="wallet-input" class="bg-transparent text-xs font-mono px-3 py-1.5 w-full outline-none text-blue-400" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="updateUser()" class="bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded uppercase hover:bg-blue-500 transition-all">Track</button>
            </div>
            <div id="status-bar" class="text-[9px] font-mono text-gray-500 uppercase tracking-widest">Live Sync Active</div>
        </header>

        <div id="analytics-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"></div>

        <hr class="border-gray-800/50 mb-6">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="flex flex-col h-[50vh]"><h2 class="bg-orange-600 text-[10px] font-black p-1.5 mb-2 rounded text-center uppercase">Bitcoin</h2><div id="col-btc" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[50vh]"><h2 class="bg-blue-600 text-[10px] font-black p-1.5 mb-2 rounded text-center uppercase">Ethereum</h2><div id="col-eth" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
            <div class="flex flex-col h-[50vh]"><h2 class="bg-purple-600 text-[10px] font-black p-1.5 mb-2 rounded text-center uppercase">Solana</h2><div id="col-sol" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div></div>
        </div>
    </div>

    <script>
        let CURRENT_USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth', 'sol'];
        let activeMarkets = {}; 

        async function sync() {
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${CURRENT_USER}&limit=100`);
                const trades = await res.json();
                
                // Clear and Re-initialize
                ASSETS.forEach(a => {
                    activeMarkets[a] = {
                        "5m": { title: "Waiting for trade...", upC: 0, upV: 0, downC: 0, downV: 0 },
                        "15m": { title: "Waiting for trade...", upC: 0, upV: 0, downC: 0, downV: 0 }
                    };
                    document.getElementById(`col-${a}`).innerHTML = '';
                });

                // PASS 1: Identify the MOST RECENT title for each timeframe to ensure stats match CURRENT market
                trades.forEach(t => {
                    const title = t.title;
                    const asset = ASSETS.find(a => title.toLowerCase().includes(a) || (a==='btc' && title.toLowerCase().includes('bit')));
                    const timeframe = title.toLowerCase().includes('5 min') ? '5m' : '15m';

                    if (asset && activeMarkets[asset][timeframe].title === "Waiting for trade...") {
                        activeMarkets[asset][timeframe].title = title;
                    }
                });

                // PASS 2: Aggregate Stats for the Identified Markets & Build Feed
                trades.forEach(t => {
                    const title = t.title;
                    const asset = ASSETS.find(a => title.toLowerCase().includes(a) || (a==='btc' && title.toLowerCase().includes('bit')));
                    const timeframe = title.toLowerCase().includes('5 min') ? '5m' : '15m';

                    if (asset) {
                        // Only add to stats if it matches the current active window title
                        if (title === activeMarkets[asset][timeframe].title) {
                            const isDown = (t.outcomeIndex == "1") || (t.outcome?.toLowerCase() === 'no');
                            const vol = parseFloat(t.usdcSize) || 0;
                            const m = activeMarkets[asset][timeframe];

                            if (isDown) { m.downC++; m.downV += vol; }
                            else { m.upC++; m.upV += vol; }
                        }
                        renderCard(asset, t);
                    }
                });

                renderStats();
            } catch (e) { console.error("Sync Error:", e); }
        }

        function renderStats() {
            const grid = document.getElementById('analytics-grid');
            grid.innerHTML = '';
            ASSETS.forEach(a => {
                const color = a === 'btc' ? 'orange-500' : a === 'eth' ? 'blue-500' : 'purple-500';
                const div = document.createElement('div');
                div.className = "bg-[#161b22] border border-gray-800 rounded-lg overflow-hidden";
                div.innerHTML = `
                    <div class="bg-${color} text-black text-[10px] font-black py-1 px-3 uppercase">${a} Monitor</div>
                    <div class="p-3 space-y-4">
                        ${renderRow(a, "5m")}
                        ${renderRow(a, "15m")}
                    </div>`;
                grid.appendChild(div);
            });
        }

        function renderRow(asset, tf) {
            const d = activeMarkets[asset][tf];
            return `
                <div>
                    <div class="flex justify-between items-center mb-1 border-b border-gray-800/50 pb-1">
                        <span class="text-[9px] text-blue-500 font-black uppercase">${tf} LIVE</span>
                    </div>
                    <div class="text-[8px] text-gray-500 truncate mb-2 font-mono uppercase">${d.title}</div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="stat-box border-l-2 border-green-500">
                            <div class="text-[7px] text-gray-500 font-bold uppercase tracking-widest">UP</div>
                            <div class="text-[13px] font-black text-green-400">${d.upC} <span class="text-[9px] text-gray-600 ml-1">$${Math.round(d.upV)}</span></div>
                        </div>
                        <div class="stat-box border-l-2 border-red-500">
                            <div class="text-[7px] text-gray-500 font-bold uppercase tracking-widest">DOWN</div>
                            <div class="text-[13px] font-black text-red-400">${d.downC} <span class="text-[9px] text-gray-600 ml-1">$${Math.round(d.downV)}</span></div>
                        </div>
                    </div>
                </div>`;
        }

        function renderCard(asset, t) {
            const isDown = (t.outcomeIndex == "1") || (t.outcome?.toLowerCase() === 'no');
            const dir = isDown ? "DOWN" : "UP";
            const price = (parseFloat(t.usdcSize) / parseFloat(t.size)).toFixed(2);
            const html = `
                <div class="bg-[#1a1f26] border border-gray-800 rounded p-2 mb-2">
                    <div class="flex justify-between text-[7px] mb-1 font-mono text-gray-500">
                        <span>${t.title.includes('5 min')?'5M':'15M'}</span>
                        <span>${new Date(t.timestamp*1000).toLocaleTimeString([],{hour12:false})}</span>
                    </div>
                    <div class="text-[9px] font-bold text-gray-300 truncate mb-2">${t.title}</div>
                    <div class="grid grid-cols-3 gap-1 text-center bg-black/30 rounded p-1 border border-white/5">
                        <div><div class="text-[6px] text-gray-400">SIDE</div><div class="text-[9px] font-black ${dir==='UP'?'text-green-500':'text-red-500'}">${dir}</div></div>
                        <div><div class="text-[6px] text-gray-400">PRC</div><div class="text-[9px] font-mono text-yellow-500">${price}¢</div></div>
                        <div><div class="text-[6px] text-gray-400">VOL</div><div class="text-[9px] font-mono text-blue-400">$${Math.round(t.usdcSize)}</div></div>
                    </div>
                </div>`;
            document.getElementById(`col-${asset}`).insertAdjacentHTML('beforeend', html);
        }

        function updateUser() { CURRENT_USER = document.getElementById('wallet-input').value.trim(); sync(); }
        setInterval(sync, 10000);
        sync();
    </script>
</body>
</html>
