<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Crypto Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-4">
    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-6 py-2">
            <h1 class="text-xl font-black text-white italic tracking-tighter">@RENAME <span class="text-blue-500">MONITOR</span></h1>
            <div id="status-bar" class="text-[10px] font-mono text-gray-500 bg-gray-900 px-3 py-1 rounded-full border border-gray-800 uppercase tracking-widest">
                Connecting...
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            
            <div class="flex flex-col h-[85vh]">
                <h2 class="bg-orange-500/10 text-orange-500 text-[10px] font-black p-2 mb-2 rounded border border-orange-500/20 text-center uppercase tracking-widest">Bitcoin</h2>
                <div id="col-btc" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>

            <div class="flex flex-col h-[85vh]">
                <h2 class="bg-blue-500/10 text-blue-500 text-[10px] font-black p-2 mb-2 rounded border border-blue-500/20 text-center uppercase tracking-widest">Ethereum</h2>
                <div id="col-eth" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>

            <div class="flex flex-col h-[85vh]">
                <h2 class="bg-purple-500/10 text-purple-500 text-[10px] font-black p-2 mb-2 rounded border border-purple-500/20 text-center uppercase tracking-widest">Solana</h2>
                <div id="col-sol" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>

            <div class="flex flex-col h-[85vh]">
                <h2 class="bg-teal-500/10 text-teal-500 text-[10px] font-black p-2 mb-2 rounded border border-teal-500/20 text-center uppercase tracking-widest">XRP</h2>
                <div id="col-xrp" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>

        </div>
    </div>

    <script>
        const USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";

        async function sync() {
            try {
                const response = await fetch(`https://data-api.polymarket.com/activity?user=${USER}&limit=40`);
                const data = await response.json();
                
                // Clear columns
                ['btc', 'eth', 'sol', 'xrp'].forEach(id => document.getElementById(`col-${id}`).innerHTML = '');

                data.forEach(item => {
                    const title = item.title.toLowerCase();
                    let targetCol = null;

                    if (title.includes('btc') || title.includes('bitcoin')) targetCol = 'btc';
                    else if (title.includes('eth') || title.includes('ethereum')) targetCol = 'eth';
                    else if (title.includes('solana') || title.includes('sol')) targetCol = 'sol';
                    else if (title.includes('xrp')) targetCol = 'xrp';

                    if (targetCol) {
                        const html = createCard(item);
                        document.getElementById(`col-${targetCol}`).insertAdjacentHTML('beforeend', html);
                    }
                });

                document.getElementById('status-bar').innerText = "Last Update: " + new Date().toLocaleTimeString();
            } catch (err) {
                console.error("Sync Error", err);
                document.getElementById('status-bar').innerText = "Connection Lost";
            }
        }

        function createCard(item) {
            // Mapping for Binary Markets: index 0 is UP, 1 is DOWN
            let direction = "UNKNOWN";
            if (item.outcomeIndex === "0") direction = "UP";
            else if (item.outcomeIndex === "1") direction = "DOWN";
            else if (item.outcome) direction = item.outcome.toUpperCase();

            const isBuy = item.side === 'BUY';
            const value = item.usdcSize ? parseFloat(item.usdcSize).toFixed(2) : "0.00";
            const price = item.price ? parseFloat(item.price).toFixed(3) : "0.000";

            return `
                <div class="bg-[#161b22] border border-gray-800 rounded-lg p-3 hover:border-gray-600 transition group">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-bold ${isBuy ? 'text-green-500' : 'text-red-400'} uppercase tracking-tighter">
                            ${item.side} ${item.type}
                        </span>
                        <span class="text-[9px] text-gray-600 font-mono">${new Date(item.timestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                    
                    <div class="text-[11px] font-medium text-gray-300 mb-3 leading-tight group-hover:text-white transition">
                        ${item.title}
                    </div>

                    <div class="flex justify-between items-end bg-black/30 p-2 rounded border border-gray-800/50">
                        <div>
                            <div class="text-[8px] text-gray-500 uppercase font-bold">Bet</div>
                            <div class="text-sm font-black ${direction === 'UP' ? 'text-green-400' : 'text-red-400'}">${direction}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[8px] text-gray-500 uppercase font-bold">Value</div>
                            <div class="text-xs font-mono font-bold">$${value}</div>
                            <div class="text-[9px] text-gray-600">$${price}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        sync();
        setInterval(sync, 10000); // 10 second refresh for high-speed tracking
    </script>
</body>
</html>
