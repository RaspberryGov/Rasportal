<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket High-Frequency Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0b0e14; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2d333b; border-radius: 10px; }
        .column-height { height: calc(100vh - 120px); }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-300 font-sans p-2 overflow-hidden">
    
    <header class="flex justify-between items-center mb-4 px-4 border-b border-gray-800 pb-2">
        <h1 class="text-lg font-black text-white tracking-tighter">@RENAME <span class="text-blue-500">PRO MONITOR</span></h1>
        <div id="status" class="text-[9px] font-mono text-gray-500 uppercase tracking-widest bg-gray-900 px-3 py-1 rounded-full">Initializing...</div>
    </header>

    <div class="grid grid-cols-4 gap-2 px-2">
        
        <div class="space-y-2">
            <h2 class="text-center text-[10px] font-bold text-orange-500 bg-orange-500/10 py-1 rounded border border-orange-500/20 uppercase">Bitcoin</h2>
            <div class="grid grid-cols-2 gap-1">
                <div class="flex flex-col"><span class="text-[8px] text-gray-600 mb-1 font-bold uppercase text-center">5 Min</span><div id="btc-5m" class="column-height overflow-y-auto custom-scrollbar space-y-2 pr-1"></div></div>
                <div class="flex flex-col"><span class="text-[8px] text-gray-600 mb-1 font-bold uppercase text-center">15 Min</span><div id="btc-15m" class="column-height overflow-y-auto custom-scrollbar space-y-2 pr-1"></div></div>
            </div>
        </div>

        <div class="space-y-2">
            <h2 class="text-center text-[10px] font-bold text-blue-400 bg-blue-400/10 py-1 rounded border border-blue-400/20 uppercase">Ethereum</h2>
            <div class="grid grid-cols-2 gap-1">
                <div class="flex flex-col"><span class="text-[8px] text-gray-600 mb-1 font-bold uppercase text-center">5 Min</span><div id="eth-5m" class="column-height overflow-y-auto custom-scrollbar space-y-2 pr-1"></div></div>
                <div class="flex flex-col"><span class="text-[8px] text-gray-600 mb-1 font-bold uppercase text-center">15 Min</span><div id="eth-15m" class="column-height overflow-y-auto custom-scrollbar space-y-2 pr-1"></div></div>
            </div>
        </div>

        <div class="space-y-2">
            <h2 class="text-center text-[10px] font-bold text-purple-400 bg-purple-400/10 py-1 rounded border border-purple-400/20 uppercase">Solana</h2>
            <div class="grid grid-cols-2 gap-1">
                <div class="flex flex-col"><span class="text-[8px] text-gray-600 mb-1 font-bold uppercase text-center">5 Min</span><div id="sol-5m" class="column-height overflow-y-auto custom-scrollbar space-y-2 pr-1"></div></div>
                <div class="flex flex-col"><span class="text-[8px] text-gray-600 mb-1 font-bold uppercase text-center">15 Min</span><div id="sol-15m" class="column-height overflow-y-auto custom-scrollbar space-y-2 pr-1"></div></div>
            </div>
        </div>

        <div class="space-y-2">
            <h2 class="text-center text-[10px] font-bold text-teal-400 bg-teal-400/10 py-1 rounded border border-teal-400/20 uppercase">XRP</h2>
            <div class="grid grid-cols-2 gap-1">
                <div class="flex flex-col"><span class="text-[8px] text-gray-600 mb-1 font-bold uppercase text-center">5 Min</span><div id="xrp-5m" class="column-height overflow-y-auto custom-scrollbar space-y-2 pr-1"></div></div>
                <div class="flex flex-col"><span class="text-[8px] text-gray-600 mb-1 font-bold uppercase text-center">15 Min</span><div id="xrp-15m" class="column-height overflow-y-auto custom-scrollbar space-y-2 pr-1"></div></div>
            </div>
        </div>

    </div>

    <script>
        const USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth', 'sol', 'xrp'];
        const TIMEFRAMES = ['5m', '15m'];

        async function sync() {
            try {
                const response = await fetch(`https://data-api.polymarket.com/activity?user=${USER}&limit=50`);
                const data = await response.json();
                
                // Clear all sub-columns
                ASSETS.forEach(a => TIMEFRAMES.forEach(t => document.getElementById(`${a}-${t}`).innerHTML = ''));

                data.forEach(item => {
                    const title = item.title.toLowerCase();
                    let asset = null;
                    let timeframe = null;

                    // Identify Asset
                    if (title.includes('btc') || title.includes('bitcoin')) asset = 'btc';
                    else if (title.includes('eth') || title.includes('ethereum')) asset = 'eth';
                    else if (title.includes('solana') || title.includes('sol')) asset = 'sol';
                    else if (title.includes('xrp')) asset = 'xrp';

                    // Identify Timeframe
                    if (title.includes('5 minute') || title.includes('5m')) timeframe = '5m';
                    else if (title.includes('15 minute') || title.includes('15m')) timeframe = '15m';

                    if (asset && timeframe) {
                        const html = createCard(item);
                        document.getElementById(`${asset}-${timeframe}`).insertAdjacentHTML('beforeend', html);
                    }
                });

                document.getElementById('status').innerText = "Last Update: " + new Date().toLocaleTimeString();
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Sync Error";
            }
        }

        function createCard(item) {
            let direction = "UNK";
            if (item.outcomeIndex === "0") direction = "UP";
            else if (item.outcomeIndex === "1") direction = "DOWN";
            else if (item.outcome) direction = item.outcome.toUpperCase();

            const isBuy = item.side === 'BUY';
            const value = item.usdcSize ? parseFloat(item.usdcSize).toFixed(1) : "0.0";
            const price = item.price ? parseFloat(item.price).toFixed(2) : "0.00";

            return `
                <div class="bg-[#161b22] border border-gray-800 rounded p-2 hover:bg-[#1c2128] transition relative overflow-hidden">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[7px] font-black ${isBuy ? 'text-green-500' : 'text-red-500'} uppercase">${item.side}</span>
                        <span class="text-[7px] text-gray-600 font-mono">${new Date(item.timestamp * 1000).toLocaleTimeString([], {minute:'2-digit', second:'2-digit'})}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-black ${direction === 'UP' ? 'text-green-400' : 'text-red-400'}">${direction}</span>
                        <div class="text-right">
                            <span class="text-[10px] font-mono text-white">$${value}</span>
                            <div class="text-[7px] text-gray-600">$${price}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        sync();
        setInterval(sync, 10000); 
    </script>
</body>
</html>
