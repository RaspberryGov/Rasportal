<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polymarket Quant Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 6px; }
        .flash-red { animation: flash 1s infinite; color: #ef4444 !important; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        body { font-size: 10px; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-2">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col items-center mb-3 text-center">
            <h1 class="text-sm font-black text-white italic uppercase tracking-tighter">BTC · ETH <span class="text-blue-500 text-xs">Quant Sync</span></h1>
            <div class="flex mt-1 w-full max-w-[280px] bg-[#161b22] border border-gray-800 rounded p-0.5">
                <input type="text" id="wallet" class="bg-transparent px-2 py-1 text-[9px] font-mono w-full text-blue-400 outline-none" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="sync()" class="bg-blue-600 text-white px-2 py-1 rounded text-[8px] font-black uppercase hover:bg-blue-500">Track</button>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="space-y-2">
                <h2 class="bg-orange-600 text-black text-[8px] font-black p-0.5 rounded text-center uppercase tracking-tighter">Bitcoin Monitor</h2>
                <div id="btc-5m-box"></div>
                <div id="btc-15m-box"></div>
            </div>
            <div class="space-y-2">
                <h2 class="bg-blue-600 text-black text-[8px] font-black p-0.5 rounded text-center uppercase tracking-tighter">Ethereum Monitor</h2>
                <div id="eth-5m-box"></div>
                <div id="eth-15m-box"></div>
            </div>
        </div>

        <hr class="border-gray-800/50 mb-3">

        <div class="grid grid-cols-2 gap-3">
            <div id="feed-btc" class="h-[40vh] overflow-y-auto custom-scrollbar space-y-1 pr-1"></div>
            <div id="feed-eth" class="h-[40vh] overflow-y-auto custom-scrollbar space-y-1 pr-1"></div>
        </div>
    </div>

    <script>
        let DATA = {};
        const ASSETS = ['btc', 'eth'];

        function getCountdownData(mins) {
            const now = new Date();
            const msInWindow = mins * 60 * 1000;
            const timeRemaining = msInWindow - (now.getTime() % msInWindow);
            const totalSecs = Math.floor(timeRemaining / 1000);
            const s = totalSecs % 60;
            const m = Math.floor(totalSecs / 60);
            return { 
                str: `${m}:${s < 10 ? '0' : ''}${s}`, 
                isCritical: totalSecs <= 10 
            };
        }

        function initData() {
            ASSETS.forEach(a => {
                DATA[a] = {
                    "5m": { activeId: null, upC: 0, upV: 0, downC: 0, downV: 0 },
                    "15m": { activeId: null, upC: 0, upV: 0, downC: 0, downV: 0 }
                };
            });
        }

        async function sync() {
            const wallet = document.getElementById('wallet').value.trim();
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${wallet}&limit=100`);
                const trades = await res.json();
                initData();
                ASSETS.forEach(a => document.getElementById(`feed-${a}`).innerHTML = '');

                trades.forEach(t => {
                    const slug = t.slug || "";
                    const asset = ASSETS.find(a => slug.toLowerCase().includes(a));
                    if (!asset) return;

                    // Improved 15m detection for different slug formats
                    const is15m = slug.includes('15m') || t.title.toLowerCase().includes('15 min');
                    const tf = is15m ? '15m' : '5m';
                    const marketId = slug.split('-').pop();

                    if (!DATA[asset][tf].activeId) DATA[asset][tf].activeId = marketId;

                    if (marketId === DATA[asset][tf].activeId) {
                        const isDown = (t.outcomeIndex == "1") || (t.outcome?.toLowerCase().includes('no') || t.outcome?.toLowerCase().includes('down'));
                        const vol = parseFloat(t.usdcSize) || 0;
                        if (isDown) { DATA[asset][tf].downC++; DATA[asset][tf].downV += vol; }
                        else { DATA[asset][tf].upC++; DATA[asset][tf].upV += vol; }
                    }
                    renderRow(asset, t);
                });
                updateUI();
            } catch (err) { console.error(err); }
        }

        function updateUI() {
            ASSETS.forEach(a => {
                ['5m', '15m'].forEach(tf => {
                    const d = DATA[a][tf];
                    const cd = getCountdownData(tf === '5m' ? 5 : 15);
                    const timerClass = cd.isCritical ? 'flash-red' : 'text-yellow-500';
                    
                    document.getElementById(`${a}-${tf}-box`).innerHTML = `
                        <div class="stat-card">
                            <div class="flex justify-between items-center mb-1 text-[7px] font-mono uppercase">
                                <span class="text-blue-400 font-bold">${tf} Window</span>
                                <span class="${timerClass} font-bold">RESET: ${cd.str}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="bg-black/20 p-1.5 rounded border-l-2 border-green-600">
                                    <div class="text-[6px] text-gray-500 font-bold uppercase">UP</div>
                                    <div class="text-[11px] font-black text-green-400">${d.upC} <span class="text-[8px] text-gray-600 ml-0.5">$${Math.round(d.upV)}</span></div>
                                </div>
                                <div class="bg-black/20 p-1.5 rounded border-l-2 border-red-600">
                                    <div class="text-[6px] text-gray-500 font-bold uppercase">DOWN</div>
                                    <div class="text-[11px] font-black text-red-400">${d.downC} <span class="text-[8px] text-gray-600 ml-0.5">$${Math.round(d.downV)}</span></div>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function renderRow(asset, t) {
            const isDown = (t.outcomeIndex == "1") || (t.outcome?.toLowerCase().includes('no') || t.outcome?.toLowerCase().includes('down'));
            const price = (parseFloat(t.usdcSize) / parseFloat(t.size)).toFixed(2);
            const is15m = t.slug.includes('15m') || t.title.toLowerCase().includes('15 min');
            const html = `
                <div class="bg-[#161b22] border border-gray-800 rounded p-1 text-[8px]">
                    <div class="flex justify-between text-[6px] text-gray-600 mb-0.5 font-mono uppercase">
                        <span>${is15m?'15M':'5M'}</span>
                        <span>${new Date(t.timestamp*1000).toLocaleTimeString([], {hour12:false})}</span>
                    </div>
                    <div class="truncate font-bold text-gray-400 mb-1 tracking-tighter">${t.title}</div>
                    <div class="flex justify-between items-center bg-black/30 p-1 rounded">
                        <span class="${isDown?'text-red-500':'text-green-500'} font-black uppercase text-[7px]">${isDown?'Down':'Up'}</span>
                        <span class="text-yellow-500 font-mono font-bold">${price}¢</span>
                        <span class="text-blue-400 font-mono">$${Math.round(t.usdcSize)}</span>
                    </div>
                </div>`;
            document.getElementById(`feed-${asset}`).insertAdjacentHTML('beforeend', html);
        }

        setInterval(sync, 8000); 
        setInterval(updateUI, 1000); 
        sync();
    </script>
</body>
</html>
