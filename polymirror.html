<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Live 5M/15M Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1a1c23; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .status-active { animation: pulse-border 2s infinite; }
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(59, 130, 246, 0.3); }
            50% { border-color: rgba(59, 130, 246, 1); }
        }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-2 md:p-4">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col mb-6 gap-4 items-center text-center">
            <div class="flex flex-wrap justify-center items-center gap-4 w-full">
                <h1 class="text-xl font-black text-white italic tracking-tighter">POLY <span class="text-blue-500">LIVE FEED</span></h1>
                <div id="status-bar" class="text-[9px] font-mono text-gray-400 bg-gray-900 px-3 py-1.5 rounded-full border border-gray-800 uppercase tracking-widest status-active">INITIALIZING...</div>
            </div>

            <div class="flex items-center bg-[#161b22] border border-gray-800 rounded-xl p-1 shadow-2xl w-full max-w-lg">
                <input type="text" id="wallet-input" placeholder="Wallet Address (0x...)" class="bg-transparent text-sm font-mono px-4 py-2 w-full outline-none text-blue-400" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="updateUser()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-black px-6 py-2.5 rounded-lg uppercase transition-all">Track</button>
            </div>
        </header>

        <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="flex flex-col h-[75vh]">
                <h2 class="bg-orange-500 text-black text-[10px] font-black p-2 mb-2 rounded text-center uppercase tracking-wider">Bitcoin</h2>
                <div id="col-btc" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div class="flex flex-col h-[75vh]">
                <h2 class="bg-blue-500 text-black text-[10px] font-black p-2 mb-2 rounded text-center uppercase tracking-wider">Ethereum</h2>
                <div id="col-eth" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div class="flex flex-col h-[75vh]">
                <h2 class="bg-purple-500 text-black text-[10px] font-black p-2 mb-2 rounded text-center uppercase tracking-wider">Solana</h2>
                <div id="col-sol" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
            <div class="flex flex-col h-[75vh]">
                <h2 class="bg-teal-500 text-black text-[10px] font-black p-2 mb-2 rounded text-center uppercase tracking-wider">XRP</h2>
                <div id="col-xrp" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
            </div>
        </div>
    </div>

    <script>
        let CURRENT_USER = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        const ASSETS = ['btc', 'eth', 'sol', 'xrp'];

        function getDurationLabel(title) {
            const timeRegex = /(\d{1,2}):(\d{2})(AM|PM|am|pm)-(\d{1,2}):(\d{2})(AM|PM|am|pm)/;
            const match = title.match(timeRegex);
            
            if (match) {
                let h1 = parseInt(match[1]); const m1 = parseInt(match[2]); const p1 = match[3].toLowerCase();
                let h2 = parseInt(match[4]); const m2 = parseInt(match[5]); const p2 = match[6].toLowerCase();

                if (p1 === 'pm' && h1 < 12) h1 += 12; if (p1 === 'am' && h1 === 12) h1 = 0;
                if (p2 === 'pm' && h2 < 12) h2 += 12; if (p2 === 'am' && h2 === 12) h2 = 0;

                const date1 = new Date(0, 0, 0, h1, m1);
                const date2 = new Date(0, 0, 0, h2, m2);
                let diff = (date2 - date1) / 1000 / 60;
                if (diff < 0) diff += 1440; 
                return `${diff} MINUTE`;
            }
            return "SHORT-TERM";
        }

        async function sync() {
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${CURRENT_USER}&limit=100`);
                const data = await res.json();
                
                ASSETS.forEach(id => document.getElementById(`col-${id}`).innerHTML = '');

                if (!data || data.length === 0) {
                    document.getElementById('status-bar').innerText = "NO TRADES FOUND";
                    return;
                }

                data.forEach(item => {
                    const title = item.title;
                    const lowerTitle = title.toLowerCase();
                    const isUpDown = lowerTitle.includes('up or down');
                    if (!isUpDown) return;

                    let assetKey = null;
                    if (lowerTitle.includes('btc') || lowerTitle.includes('bitcoin')) assetKey = 'btc';
                    else if (lowerTitle.includes('eth') || lowerTitle.includes('ethereum')) assetKey = 'eth';
                    else if (lowerTitle.includes('sol')) assetKey = 'sol';
                    else if (lowerTitle.includes('xrp')) assetKey = 'xrp';
                    
                    if (assetKey) {
                        const duration = getDurationLabel(title);
                        renderCard(assetKey, item, duration);
                    }
                });
                
                document.getElementById('status-bar').innerText = `UPDATED: ${new Date().toLocaleTimeString()}`;
            } catch (e) { 
                document.getElementById('status-bar').innerText = "CONNECTION ERROR"; 
            }
        }

        function renderCard(columnId, item, duration) {
            let direction = "UP";
            const outcome = item.outcome?.toLowerCase();
            if (item.outcomeIndex === "1" || outcome === 'no') direction = "DOWN";

            // Transaction Type & Dynamic Coloring
            const transType = item.side ? item.side.toUpperCase() : "UNKNOWN";
            let typeColor = "text-gray-400";
            if (transType === 'BUY') typeColor = "text-green-400";
            else if (transType === 'SELL') typeColor = "text-red-400";
            else if (transType === 'MERGE' || transType === 'REDEEM' || transType === 'REDEEMED') typeColor = "text-purple-400";

            const dirColor = direction === 'UP' ? 'text-green-500' : 'text-red-500';
            const sharePrice = item.size && item.size !== "0" ? (parseFloat(item.usdcSize) / parseFloat(item.size)).toFixed(2) : "0.00";

            const html = `
                <div class="bg-[#161b22] border border-gray-800 rounded-lg p-3 hover:border-blue-500/50 transition-all shadow-lg">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[9px] font-black bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded border border-blue-500/20 uppercase tracking-widest">${duration}</span>
                        <span class="text-[10px] text-gray-400 font-mono">${new Date(item.timestamp*1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    
                    <div class="text-[12px] font-bold text-white mb-3 flex justify-between items-start gap-2">
                        <span>${item.title}</span>
                        <a href="https://polymarket.com/event/${item.slug}" target="_blank" class="text-blue-500 hover:text-blue-400 flex-shrink-0 mt-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>

                    <div class="grid grid-cols-3 gap-1 bg-black/40 p-2 rounded border border-gray-800/50">
                        <div class="text-center border-r border-gray-800">
                            <div class="text-[8px] text-gray-500 uppercase font-bold mb-1">Position</div>
                            <div class="text-[11px] font-black ${dirColor}">${direction}</div>
                        </div>
                        <div class="text-center border-r border-gray-800">
                            <div class="text-[8px] text-gray-500 uppercase font-bold mb-1">Price</div>
                            <div class="text-[11px] font-mono font-bold text-yellow-500">${sharePrice}¢</div>
                        </div>
                        <div class="text-center">
                            <div class="text-[8px] text-gray-500 uppercase font-bold mb-1">Total</div>
                            <div class="text-[11px] font-mono font-black text-blue-400">$${Math.round(item.usdcSize)}</div>
                        </div>
                    </div>
                    
                    <div class="mt-2 text-[10px] font-black text-center tracking-[0.2em] ${typeColor} opacity-90 uppercase border-t border-gray-800/50 pt-2">
                        ${transType}
                    </div>
                </div>
            `;
            document.getElementById(`col-${columnId}`).insertAdjacentHTML('beforeend', html);
        }

        function updateUser() {
            const val = document.getElementById('wallet-input').value.trim();
            if (val.length === 42) {
                CURRENT_USER = val;
                sync();
            }
        }

        sync();
        setInterval(sync, 15000);
    </script>
</body>
</html>
