<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polymarket Hard-Sync Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f4451; border-radius: 10px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-2">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex flex-col items-center mb-6 text-center">
            <h1 class="text-xl font-black text-white italic uppercase tracking-tighter">BTC · ETH <span class="text-blue-500">Event Sync</span></h1>
            <div class="flex mt-2 w-full max-w-md bg-[#161b22] border border-gray-800 rounded p-1">
                <input type="text" id="wallet" class="bg-transparent px-3 py-1.5 text-xs font-mono w-full text-blue-400 outline-none" value="0xf6963d4cdbb6f26d753bda303e9513132afb1b7d">
                <button onclick="sync()" class="bg-blue-600 text-white px-4 py-1.5 rounded text-[10px] font-black uppercase hover:bg-blue-500">Track</button>
            </div>
            <div id="status" class="text-[9px] font-mono text-gray-500 mt-2 uppercase tracking-widest">Hard-Syncing Event IDs...</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="space-y-4">
                <h2 class="bg-orange-600 text-black text-[10px] font-black p-1.5 rounded text-center uppercase">Bitcoin Monitor</h2>
                <div id="btc-5m-box"></div>
                <div id="btc-15m-box"></div>
            </div>

            <div class="space-y-4">
                <h2 class="bg-blue-600 text-black text-[10px] font-black p-1.5 rounded text-center uppercase">Ethereum Monitor</h2>
                <div id="eth-5m-box"></div>
                <div id="eth-15m-box"></div>
            </div>
        </div>
    </div>

    <script>
        let DATA = {};
        const ASSETS = { 'btc': 1771991100, 'eth': 1771991400 }; // Base seeds provided by user

        // This calculates the EXACT event ID for the current 5m or 15m window
        function getLiveEventID(timeframe) {
            const now = Math.floor(Date.now() / 1000);
            const interval = timeframe === '5m' ? 300 : 900;
            return Math.floor(now / interval) * interval;
        }

        function initData() {
            Object.keys(ASSETS).forEach(a => {
                DATA[a] = {
                    "5m": { id: getLiveEventID('5m'), upC: 0, upV: 0, downC: 0, downV: 0 },
                    "15m": { id: getLiveEventID('15m'), upC: 0, upV: 0, downC: 0, downV: 0 }
                };
            });
        }

        async function sync() {
            const wallet = document.getElementById('wallet').value.trim();
            try {
                const res = await fetch(`https://data-api.polymarket.com/activity?user=${wallet}&limit=100`);
                const trades = await res.json();
                
                initData();

                trades.forEach(t => {
                    const slug = t.slug || "";
                    const asset = Object.keys(ASSETS).find(a => slug.startsWith(a));
                    if (!asset) return;

                    const timeframe = slug.includes('5m') ? '5m' : '15m';
                    const currentId = DATA[asset][timeframe].id;

                    // Hard check: Does the trade's slug end with the current LIVE Event ID?
                    if (slug.endsWith(currentId.toString())) {
                        const isDown = (t.outcomeIndex == "1") || (t.outcome?.toLowerCase() === 'no' || t.outcome?.toLowerCase() === 'down');
                        const vol = parseFloat(t.usdcSize) || 0;

                        if (isDown) {
                            DATA[asset][timeframe].downC++;
                            DATA[asset][timeframe].downV += vol;
                        } else {
                            DATA[asset][timeframe].upC++;
                            DATA[asset][timeframe].upV += vol;
                        }
                    }
                });

                updateUI();
                document.getElementById('status').innerText = `ID Sync: ${DATA.btc['5m'].id} | Updated: ${new Date().toLocaleTimeString()}`;
            } catch (err) { console.error("Sync Error:", err); }
        }

        function updateUI() {
            Object.keys(ASSETS).forEach(a => {
                ['5m', '15m'].forEach(tf => {
                    const d = DATA[a][tf];
                    const container = document.getElementById(`${a}-${tf}-box`);
                    container.innerHTML = `
                        <div class="stat-card">
                            <div class="flex justify-between items-center border-b border-gray-800 pb-2 mb-3">
                                <span class="text-[10px] font-black text-blue-500 uppercase">${tf === '5m' ? '5 Minute' : '15 Minute'}</span>
                                <span class="text-[9px] font-mono text-gray-600 uppercase">ID: ${d.id}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-black/40 p-3 rounded border-l-2 border-green-500">
                                    <div class="text-[7px] text-gray-500 font-bold uppercase">UP Positions</div>
                                    <div class="text-lg font-black text-green-400">${d.upC}</div>
                                    <div class="text-[10px] text-gray-400 font-mono">$${Math.round(d.upV)} Vol</div>
                                </div>
                                <div class="bg-black/40 p-3 rounded border-l-2 border-red-500">
                                    <div class="text-[7px] text-gray-500 font-bold uppercase">DOWN Positions</div>
                                    <div class="text-lg font-black text-red-400">${d.downC}</div>
                                    <div class="text-[10px] text-gray-400 font-mono">$${Math.round(d.downV)} Vol</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
        }

        setInterval(sync, 10000); // 10s refresh
        sync();
    </script>
</body>
</html>
