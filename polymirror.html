<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Deep Monitor: @rename</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-200 min-h-screen p-4 font-mono">
    <div class="max-w-4xl mx-auto">
        <header class="border-b border-slate-800 pb-6 mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-white uppercase tracking-tighter">User: @rename</h1>
                <p id="proxy-display" class="text-xs text-slate-500">Resolving Proxy Wallet...</p>
            </div>
            <button onclick="init()" class="bg-white text-black px-4 py-1 text-xs font-bold hover:bg-slate-200 transition">FORCE REFRESH</button>
        </header>

        <div class="grid md:grid-cols-2 gap-8">
            <section>
                <h2 class="text-blue-500 text-xs font-bold mb-4 border-l-2 border-blue-500 pl-2">ACTIVE POSITIONS</h2>
                <div id="active-list" class="space-y-4 text-sm">
                    <div class="text-slate-600 animate-pulse">Scanning blockchain...</div>
                </div>
            </section>

            <section>
                <h2 class="text-emerald-500 text-xs font-bold mb-4 border-l-2 border-emerald-500 pl-2">ACTIVITY FEED</h2>
                <div id="activity-feed" class="space-y-2 max-h-[600px] overflow-y-auto pr-2">
                    <div class="text-slate-600 animate-pulse">Loading transaction logs...</div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const PROFILE_ADDRESS = "0xf6963d4cdbb6f26d753bda303e9513132afb1b7d";
        let PROXY_ADDRESS = "";

        async function init() {
            // Step 1: Resolve the actual Trading Proxy address
            try {
                const profileRes = await fetch(`https://gamma-api.polymarket.com/public-profile?wallet=${PROFILE_ADDRESS}`);
                const profileData = await profileRes.json();
                PROXY_ADDRESS = profileData.proxyWallet || PROFILE_ADDRESS;
                document.getElementById('proxy-display').innerText = `Proxy: ${PROXY_ADDRESS}`;
                
                // Step 2: Fetch both Active and Activity Feed
                refreshData();
            } catch (e) {
                console.error("Resolution error", e);
            }
        }

        async function refreshData() {
            if (!PROXY_ADDRESS) return;

            // 1. Fetch Active Positions (matches "Positions > Active" on site)
            const posRes = await fetch(`https://data-api.polymarket.com/positions?user=${PROXY_ADDRESS}&sizeThreshold=0.01`);
            const positions = await posRes.json();
            renderPositions(positions);

            // 2. Fetch Activity (matches "Activity" tab on site)
            const actRes = await fetch(`https://data-api.polymarket.com/activity?user=${PROXY_ADDRESS}&limit=15`);
            const activity = await actRes.json();
            renderActivity(activity);
        }

        function renderPositions(data) {
            const container = document.getElementById('active-list');
            const btc = data.filter(p => p.title.toLowerCase().includes("btc"));

            if (btc.length === 0) {
                container.innerHTML = `<div class="text-slate-700 italic border border-slate-800 p-4 rounded">No active BTC positions.</div>`;
                return;
            }

            container.innerHTML = btc.map(p => `
                <div class="bg-slate-900 border border-slate-800 p-4 rounded hover:border-slate-700 transition">
                    <div class="text-[10px] text-slate-500 mb-1">${p.title}</div>
                    <div class="flex justify-between items-center">
                        <span class="font-bold ${p.outcome === 'Up' ? 'text-green-400' : 'text-red-400'} text-lg">${p.outcome.toUpperCase()}</span>
                        <div class="text-right">
                            <div class="text-white font-bold">${Math.round(p.size)} Shares</div>
                            <div class="text-[10px] text-slate-500">Avg: $${parseFloat(p.avgPrice).toFixed(3)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderActivity(data) {
            const container = document.getElementById('activity-feed');
            
            container.innerHTML = data.map(a => {
                const isBuy = a.side === 'BUY';
                const date = new Date(a.timestamp * 1000).toLocaleTimeString();
                
                return `
                <div class="text-[11px] border-b border-slate-900 pb-2 mb-2">
                    <div class="flex justify-between text-slate-500 mb-1">
                        <span>${date}</span>
                        <span class="font-bold ${isBuy ? 'text-emerald-500' : 'text-orange-500'}">${a.type}</span>
                    </div>
                    <div class="text-slate-300 truncate">${a.title || 'Market Interaction'}</div>
                    <div class="flex gap-2 mt-1">
                        <span class="text-white">$${parseFloat(a.cash).toFixed(2)}</span>
                        <span class="text-slate-600">@</span>
                        <span class="text-slate-400">$${parseFloat(a.price).toFixed(3)}</span>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Auto-update every 20 seconds for the fast 5m markets
        init();
        setInterval(refreshData, 20000);
    </script>
</body>
</html>
